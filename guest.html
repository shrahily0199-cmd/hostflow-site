<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HostFlow AI - Guest</title>

<!-- الحقوق -->
<!-- HostFlow AI © Abdullah Shrahily -->

<style>
body {font-family: Arial;background:#0f172a;color:white;text-align:center;padding:30px;}
.box {background:#1e293b;padding:20px;border-radius:15px;}
button {padding:12px;margin:10px;}
</style>
</head>

<body>

<div id="app"></div>

<script>
let params = new URLSearchParams(location.search)
let data = params.get("data")

if(!data){
document.body.innerHTML = "رابط غير صالح"
}else{

let decoded = JSON.parse(atob(data))

// التحقق من الانتهاء
if(new Date() > new Date(decoded.exp)){
document.body.innerHTML = "انتهت صلاحية الرابط"
}else{

document.getElementById("app").innerHTML = `
<div class="box">
<h2>أهلاً ${decoded.name}</h2>

<p>الوحدة: ${decoded.unit}</p>
<p>WiFi: ${decoded.wifi}</p>
<p>Password: ${decoded.pass}</p>

<button onclick="send('تنظيف')">🧹 تنظيف</button>
<button onclick="send('مناشف')">🛁 مناشف</button>
<button onclick="send('صيانة')">🔧 صيانة</button>
</div>
`
}

function send(type){
let msg = `السلام عليكم، أنا ${decoded.name} من الوحدة ${decoded.unit} وأحتاج ${type}`
window.open(`https://wa.me/${decoded.phone}?text=`+encodeURIComponent(msg))
}
}
</script>

</body>
</html>
