<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HostFlow AI</title>
  <style>
    :root{
      --bg:#f4f7fb;--card:#fff;--text:#162033;--muted:#667085;--line:#e6ecf3;
      --primary:#1f6feb;--primary-soft:#eef4ff;--primary-dark:#1558b8;
      --success:#0f766e;--success-soft:#ecfeff;--danger:#dc2626;--danger-soft:#fff1f2;
      --dark:#0f172a;--shadow:0 12px 30px rgba(15,23,42,.08);--radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Segoe UI",Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
    a{color:inherit}
    .container{width:min(1240px,calc(100% - 28px));margin:0 auto}
    .topbar{position:sticky;top:0;z-index:1000;background:rgba(15,23,42,.96);backdrop-filter:blur(12px);color:#fff;border-bottom:1px solid rgba(255,255,255,.08)}
    .topbar-inner{min-height:72px;display:flex;align-items:center;justify-content:space-between;gap:14px}
    .brand{font-weight:800;font-size:1.1rem}
    .subbrand{font-size:.85rem;color:rgba(255,255,255,.78);margin-top:3px}
    .top-actions{display:flex;gap:10px;flex-wrap:wrap}
    .pill{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:42px;padding:10px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:#fff;cursor:pointer;font-weight:700;text-decoration:none}
    .hero{background:linear-gradient(135deg,#0f172a,#1e293b 45%,#334155);color:#fff;padding:30px 0 42px}
    .hero-grid{display:grid;grid-template-columns:1.25fr .95fr;gap:20px;align-items:stretch}
    .hero h1{margin:0 0 12px;font-size:clamp(2rem,4vw,3.3rem);line-height:1.12}
    .hero p{margin:0 0 12px;color:rgba(255,255,255,.9);max-width:760px}
    .hero-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:22px;padding:20px;backdrop-filter:blur(10px)}
    .hero-list{list-style:none;padding:0;margin:0;display:grid;gap:10px;font-size:.96rem}
    .hero-list li{display:flex;gap:10px;align-items:center}
    main{padding:24px 0 60px}
    .notice{background:#fff8e6;color:#7a5b00;border:1px solid #f4df9b;padding:14px 16px;border-radius:14px;margin-bottom:18px}
    .grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
    .grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:18px}
    .section-title{margin:0 0 12px;font-size:1.18rem;font-weight:800}
    .section-subtitle{margin:-4px 0 14px;color:var(--muted);font-size:.95rem}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
    .field label{font-size:.94rem;font-weight:700}
    .field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font:inherit;background:#fff;color:var(--text)}
    .field textarea{min-height:110px;resize:vertical}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:48px;padding:12px 16px;border-radius:14px;border:1px solid transparent;text-decoration:none;cursor:pointer;font-weight:800;font:inherit;transition:.2s ease;text-align:center;white-space:nowrap}
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{background:var(--primary);color:#fff}.btn-soft{background:var(--primary-soft);color:var(--primary-dark);border-color:#d8e6ff}
    .btn-success{background:var(--success-soft);color:var(--success);border-color:#d0f5f0}.btn-danger{background:var(--danger-soft);color:var(--danger);border-color:#ffd8df}
    .btn-dark{background:var(--dark);color:#fff}
    .kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    .kpi{background:#fafcff;border:1px solid var(--line);border-radius:16px;padding:16px}
    .kpi .label{color:var(--muted);font-size:.88rem;margin-bottom:6px}.kpi .value{font-size:1.5rem;font-weight:800;line-height:1.1}
    .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px}
    table{width:100%;border-collapse:collapse;background:#fff;min-width:860px}
    th,td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:right;vertical-align:top;font-size:.95rem}
    th{background:#fafcff;font-weight:800;white-space:nowrap}tr:last-child td{border-bottom:0}
    .table-actions{display:flex;gap:8px;flex-wrap:wrap}
    .chip-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .chip{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:.92rem}
    .info-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .info-box{background:#fafcff;border:1px solid var(--line);border-radius:14px;padding:14px}
    .info-box strong{display:block;margin-bottom:4px}
    .steps,.rules-list{margin:0;padding-right:18px;color:var(--muted)}.steps li,.rules-list li{margin-bottom:10px}
    .action-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .status-box{position:fixed;bottom:20px;right:20px;z-index:1200;background:#0f172a;color:#fff;padding:14px 16px;border-radius:14px;box-shadow:0 20px 40px rgba(15,23,42,.25);display:none;max-width:380px}
    .status-box.show{display:block}
    .footer-note{text-align:center;color:var(--muted);margin-top:20px}
    .qr-img{width:90px;height:90px;margin-top:8px;border:1px solid var(--line);border-radius:10px;padding:5px;background:#fff}
    @media(max-width:1100px){.hero-grid,.grid-2,.grid-3,.kpis,.info-grid,.action-grid{grid-template-columns:1fr}table{min-width:760px}}
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="status-box" id="statusBox"></div>

<script>
"use strict";

const RIGHTS = "HostFlow AI © 2026 Abdulrahman Shrahily. All Rights Reserved.";
const STORE_KEY = "hostflow_clean_ai_v1";

const DEFAULT_STATE = {
  property: {
    name: "منشأة المستقبل",
    type: "شقق مفروشة",
    phone: "966500000000",
    frontDeskPhone: "966500000000",
    emergencyPhone: "966500000000",
    locationUrl: "https://maps.google.com",
    feedbackUrl: ""
  },
  rules: [
    "يمنع الإزعاج بعد الساعة 10 مساءً.",
    "يمنع التدخين داخل الشقة.",
    "يرجى المحافظة على نظافة المكان.",
    "الالتزام بوقت تسجيل الخروج."
  ],
  instructions: [
    "تأكد من رقم الشقة والدور قبل الدخول.",
    "استخدم بيانات الدخول المرسلة لك من المنشأة.",
    "تأكد من إغلاق الباب جيدًا عند الدخول والخروج."
  ],
  services: [
    { id: "srv-clean", label: "🧹 طلب تنظيف", type: "تنظيف", enabled: true },
    { id: "srv-towels", label: "🛁 طلب مناشف", type: "مناشف", enabled: true },
    { id: "srv-ac", label: "❄️ مشكلة في التكييف", type: "مشكلة في التكييف", enabled: true },
    { id: "srv-maint", label: "🔧 طلب صيانة", type: "صيانة", enabled: true },
    { id: "srv-help", label: "❓ طلب مساعدة", type: "مساعدة", enabled: true }
  ],
  units: [],
  guests: []
};

let state = loadState();

function clone(obj){ return JSON.parse(JSON.stringify(obj)); }
function q(id){ return document.getElementById(id); }
function uid(prefix){ return prefix + "-" + Date.now() + "-" + Math.random().toString(16).slice(2); }

function esc(value){
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[ch]));
}

function loadState(){
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) {
      const fresh = clone(DEFAULT_STATE);
      localStorage.setItem(STORE_KEY, JSON.stringify(fresh));
      return fresh;
    }
    return normalizeState(JSON.parse(raw));
  } catch (e) {
    console.error("loadState failed", e);
    const fresh = clone(DEFAULT_STATE);
    localStorage.setItem(STORE_KEY, JSON.stringify(fresh));
    return fresh;
  }
}

function normalizeState(input){
  const next = clone(DEFAULT_STATE);
  input = input || {};
  next.property = { ...next.property, ...(input.property || {}) };
  next.rules = Array.isArray(input.rules) ? input.rules : next.rules;
  next.instructions = Array.isArray(input.instructions) ? input.instructions : next.instructions;
  next.services = Array.isArray(input.services) ? input.services.map((s,i)=>({
    id: s.id || uid("srv"),
    label: s.label || "خدمة",
    type: s.type || s.label || "خدمة",
    enabled: s.enabled !== false
  })) : next.services;
  next.units = Array.isArray(input.units) ? input.units.map((u)=>({
    id: u.id || uid("unit"),
    floor: u.floor || "-",
    name: u.name || "-",
    wifi: u.wifi || "-",
    password: u.password || "-",
    checkIn: u.checkIn || "3:00 مساءً",
    checkOut: u.checkOut || "12:00 ظهرًا"
  })) : [];
  next.guests = Array.isArray(input.guests) ? input.guests.map((g)=>({
    id: g.id || uid("guest"),
    name: g.name || "-",
    phone: g.phone || "",
    unitId: g.unitId || "",
    unitSnapshot: g.unitSnapshot || null,
    checkInDate: g.checkInDate || "",
    checkOutDate: g.checkOutDate || "",
    createdAt: g.createdAt || Date.now()
  })) : [];
  return next;
}

function saveState(){
  state = normalizeState(state);
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

function showStatus(msg){
  const box = q("statusBox");
  if (!box) return;
  box.textContent = msg;
  box.classList.add("show");
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(()=>box.classList.remove("show"), 2600);
}

function splitLines(text){
  return String(text || "").split("\n").map(x => x.trim()).filter(Boolean);
}

function cleanPhone(phone){
  return String(phone || "").replace(/[^\d]/g, "");
}

function todayText(){
  return new Date().toISOString().slice(0,10);
}

function ruleSuggestions(){
  return [
    "يمنع الإزعاج بعد الساعة 10 مساءً.",
    "يمنع التدخين داخل الشقة.",
    "يرجى المحافظة على نظافة المكان.",
    "يمنع إقامة الحفلات أو التجمعات بدون إذن.",
    "الالتزام بوقت تسجيل الخروج.",
    "أي تلف أو ضرر يتم إبلاغ الإدارة عنه فورًا."
  ];
}

function instructionSuggestions(){
  return [
    "تأكد من رقم الشقة والدور قبل الدخول.",
    "استخدم بيانات الدخول المرسلة لك من المنشأة.",
    "تأكد من إغلاق الباب جيدًا عند الدخول والخروج.",
    "احتفظ بمعلومات الواي فاي الموجودة في صفحة الضيف.",
    "في حال وجود أي مشكلة، استخدم زر طلب المساعدة.",
    "عند المغادرة، تأكد من عدم نسيان أي أغراض شخصية."
  ];
}

function addSuggestionTo(textareaId, index, type){
  const list = type === "rule" ? ruleSuggestions() : instructionSuggestions();
  const value = list[index];
  const area = q(textareaId);
  if (!area || !value) return;
  const current = splitLines(area.value);
  if (!current.includes(value)) current.push(value);
  area.value = current.join("\n");
}

function encodePayload(obj){
  const json = JSON.stringify(obj);
  const utf8 = encodeURIComponent(json).replace(/%([0-9A-F]{2})/g, (_, p1) => String.fromCharCode(parseInt(p1,16)));
  return btoa(utf8).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/g,"");
}

function decodePayload(str){
  try {
    let base64 = String(str || "").replace(/-/g, "+").replace(/_/g, "/");
    while (base64.length % 4) base64 += "=";
    const binary = atob(base64);
    const json = decodeURIComponent(Array.from(binary).map(c => "%" + c.charCodeAt(0).toString(16).padStart(2,"0")).join(""));
    return JSON.parse(json);
  } catch(e) {
    console.error("decodePayload failed", e);
    return null;
  }
}

function guestUrl(payload){
  return window.location.origin + window.location.pathname + "?data=" + encodePayload(payload);
}

function qrUrl(link, size=180){
  return "https://api.qrserver.com/v1/create-qr-code/?size=" + size + "x" + size + "&data=" + encodeURIComponent(link);
}

function whatsappLink(phone, message){
  return "https://wa.me/" + cleanPhone(phone) + "?text=" + encodeURIComponent(message);
}

function findUnit(unitId){
  return state.units.find(u => u.id === unitId) || null;
}

function unitDisplay(unit){
  if (!unit) return "-";
  return (unit.floor || "-") + " - شقة " + (unit.name || "-");
}

function buildGuestPayload(guest){
  const unit = guest.unitSnapshot || findUnit(guest.unitId) || {};
  return {
    property: clone(state.property),
    guest: {
      id: guest.id,
      name: guest.name,
      phone: guest.phone,
      checkInDate: guest.checkInDate,
      checkOutDate: guest.checkOutDate
    },
    unit: {
      floor: unit.floor || "-",
      name: unit.name || "-",
      wifi: unit.wifi || "-",
      password: unit.password || "-",
      checkIn: unit.checkIn || "3:00 مساءً",
      checkOut: unit.checkOut || "12:00 ظهرًا"
    },
    rules: clone(state.rules),
    instructions: clone(state.instructions),
    services: clone(state.services.filter(s => s.enabled !== false)),
    rights: RIGHTS
  };
}

function fixedWelcomeMessage(guest, link){
  return "أهلًا " + guest.name + "،\n" +
    "نرحب بك في " + state.property.name + " ونتمنى لك إقامة مريحة ومميزة.\n\n" +
    "تم تجهيز صفحة خاصة بك تحتوي على أهم معلومات إقامتك وطلبات الخدمة.\n\n" +
    "رابط الضيف:\n" + link;
}

function serviceMessage(payload, type){
  return "السلام عليكم،\n" +
    "أنا " + payload.guest.name + "\n" +
    "الدور: " + (payload.unit.floor || "-") + "\n" +
    "الشقة: " + (payload.unit.name || "-") + "\n" +
    "المنشأة: " + payload.property.name + "\n\n" +
    "أرغب بطلب: " + type + "\n\n" +
    "شكرًا لكم.";
}

function render(){
  try {
    const data = new URLSearchParams(window.location.search).get("data");
    if (data) renderGuest(decodePayload(data));
    else renderAdmin();
  } catch(e) {
    console.error("render failed", e);
    renderError("حدث خطأ في تشغيل الصفحة. يرجى إعادة تحميل الموقع.");
  }
}

function renderAdmin(){
  document.documentElement.lang = "ar";
  document.documentElement.dir = "rtl";
  q("app").innerHTML = `
    <div class="topbar">
      <div class="container topbar-inner">
        <div>
          <div class="brand">HostFlow AI</div>
          <div class="subbrand">لوحة المنشأة - إدارة الشقق والمستأجرين</div>
        </div>
        <div class="top-actions">
          <button class="pill" onclick="printGuestsPdf()">تقرير PDF</button>
        </div>
      </div>
    </div>

    <header class="hero">
      <div class="container">
        <div class="hero-grid">
          <div>
            <h1>إدارة احترافية للمنشأة</h1>
            <p>لوحة واحدة لإدارة بيانات المنشأة، الشقق، الواي فاي، والمستأجرين، مع رابط ضيف خاص وQR لكل مستأجر ينتهي بعد تاريخ الخروج.</p>
            <p>هذه الواجهة خاصة بالمنشأة فقط. المستأجر يرى صفحة خاصة به عبر الرابط.</p>
          </div>
          <div class="hero-card">
            <ul class="hero-list">
              <li>🏨 مناسب للشقق والفنادق والفلل والاستراحات</li>
              <li>🏢 تنظيم الدور ورقم الشقة وبيانات الواي فاي</li>
              <li>👤 إنشاء صفحة خاصة لكل مستأجر حسب مدة إقامته</li>
              <li>💬 رسالة ترحيب واتساب راقية تحتوي على رابط الضيف</li>
              <li>🛎️ خدمات جاهزة للضيف بضغطة واحدة</li>
              <li>⏳ رابط الضيف ينتهي تلقائيًا بعد تاريخ الخروج</li>
              <li>🔒 ${RIGHTS}</li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <main>
      <div class="container">
        <div class="notice">لوحة المنشأة تعمل دائمًا. انتهاء الصلاحية يطبّق فقط على رابط المستأجر بعد تاريخ الخروج.</div>

        <section class="card">
          <h2 class="section-title">ملخص سريع</h2>
          <div class="kpis">
            <div class="kpi"><div class="label">الشقق / الوحدات</div><div class="value">${state.units.length}</div></div>
            <div class="kpi"><div class="label">المستأجرون</div><div class="value">${state.guests.length}</div></div>
            <div class="kpi"><div class="label">الخدمات</div><div class="value">${state.services.filter(s => s.enabled !== false).length}</div></div>
            <div class="kpi"><div class="label">الحالة</div><div class="value">جاهز</div></div>
          </div>
        </section>

        <div class="grid-2">
          <section class="card">
            <h2 class="section-title">بيانات المنشأة</h2>
            <div class="field"><label>اسم المنشأة</label><input id="propertyName" value="${esc(state.property.name)}"></div>
            <div class="field"><label>نوع المنشأة</label>
              <select id="propertyType">
                ${["شقق مفروشة","فندق","فيلا","استراحة","شاليه","منتجع"].map(t => `<option ${state.property.type === t ? "selected" : ""}>${t}</option>`).join("")}
              </select>
            </div>
            <div class="field"><label>رقم واتساب المنشأة</label><input id="propertyPhone" value="${esc(state.property.phone)}"></div>
            <div class="field"><label>رقم الاستقبال</label><input id="frontDeskPhone" value="${esc(state.property.frontDeskPhone)}"></div>
            <div class="field"><label>رقم الطوارئ</label><input id="emergencyPhone" value="${esc(state.property.emergencyPhone)}"></div>
            <div class="field"><label>رابط الموقع</label><input id="locationUrl" value="${esc(state.property.locationUrl)}"></div>
            <div class="field"><label>رابط التقييم</label><input id="feedbackUrl" value="${esc(state.property.feedbackUrl)}"></div>
            <button class="btn btn-dark" onclick="saveProperty()">حفظ بيانات المنشأة</button>
          </section>

          <section class="card">
            <h2 class="section-title">القوانين والتعليمات</h2>
            <div class="section-subtitle">اختر من الاقتراحات الجاهزة أو اكتب ما يناسب منشأتك.</div>
            <div class="field">
              <label>اقتراحات القوانين الشائعة</label>
              <div class="table-actions">${ruleSuggestions().map((x,i)=>`<button class="btn btn-soft" type="button" onclick="addSuggestionTo('rulesInput', ${i}, 'rule')">${esc(x)}</button>`).join("")}</div>
            </div>
            <div class="field"><label>القوانين المعتمدة</label><textarea id="rulesInput">${esc(state.rules.join("\n"))}</textarea></div>
            <div class="field">
              <label>اقتراحات تعليمات الدخول</label>
              <div class="table-actions">${instructionSuggestions().map((x,i)=>`<button class="btn btn-soft" type="button" onclick="addSuggestionTo('instructionsInput', ${i}, 'instruction')">${esc(x)}</button>`).join("")}</div>
            </div>
            <div class="field"><label>تعليمات الدخول المعتمدة</label><textarea id="instructionsInput">${esc(state.instructions.join("\n"))}</textarea></div>
            <button class="btn btn-soft" onclick="saveFixedContent()">حفظ القوانين والتعليمات</button>
          </section>
        </div>

        <section class="card">
          <h2 class="section-title">الخدمات التي تظهر للضيف</h2>
          <div class="section-subtitle">هذه الأزرار تظهر في صفحة المستأجر.</div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>الخدمة</th><th>نوع الطلب</th><th>الحالة</th><th>الإجراءات</th></tr></thead>
              <tbody>${renderServicesRows()}</tbody>
            </table>
          </div>
          <div class="grid-3" style="margin-top:16px;">
            <div class="field"><label>اسم الزر</label><input id="serviceLabel" placeholder="مثال: 🧺 طلب غسيل"></div>
            <div class="field"><label>نوع الطلب في الرسالة</label><input id="serviceType" placeholder="مثال: غسيل ملابس"></div>
          </div>
          <button class="btn btn-primary" onclick="addService()">إضافة خدمة</button>
        </section>

        <section class="card">
          <h2 class="section-title">إضافة شقة / وحدة</h2>
          <div class="grid-3">
            <div class="field"><label>الدور</label><input id="unitFloor" placeholder="مثال: الدور الأول"></div>
            <div class="field"><label>رقم الشقة</label><input id="unitName" placeholder="مثال: 101"></div>
            <div class="field"><label>اسم شبكة الواي فاي</label><input id="unitWifi" placeholder="مثال: Future-101"></div>
            <div class="field"><label>كلمة المرور</label><input id="unitPass" placeholder="مثال: 12345678"></div>
            <div class="field"><label>وقت الدخول</label><input id="unitCheckIn" placeholder="مثال: 3:00 مساءً"></div>
            <div class="field"><label>وقت الخروج</label><input id="unitCheckOut" placeholder="مثال: 12:00 ظهرًا"></div>
          </div>
          <button class="btn btn-primary" onclick="addUnit()">حفظ الشقة / الوحدة</button>
        </section>

        <section class="card">
          <h2 class="section-title">الشقق / الوحدات</h2>
          <div class="table-wrap">
            <table>
              <thead><tr><th>الدور / الشقة</th><th>الواي فاي</th><th>الدخول / الخروج</th><th>الإجراءات</th></tr></thead>
              <tbody>${renderUnitsRows()}</tbody>
            </table>
          </div>
        </section>

        <section class="card">
          <h2 class="section-title">إضافة مستأجر</h2>
          <div class="grid-3">
            <div class="field"><label>اسم العميل</label><input id="guestName" placeholder="مثال: اسم العميل"></div>
            <div class="field"><label>رقم جوال العميل</label><input id="guestPhone" placeholder="مثال: 9665XXXXXXXX"></div>
            <div class="field"><label>الدور / رقم الشقة</label>
              <select id="guestUnit">${state.units.map(u => `<option value="${esc(u.id)}">${esc(unitDisplay(u))}</option>`).join("")}</select>
            </div>
            <div class="field"><label>تاريخ الدخول</label><input id="guestCheckInDate" type="date"></div>
            <div class="field"><label>تاريخ الخروج</label><input id="guestCheckOutDate" type="date"></div>
          </div>
          <button class="btn btn-primary" onclick="addGuest()">حفظ المستأجر وإنشاء رابطه</button>
        </section>

        <section class="card">
          <h2 class="section-title">المستأجرون والروابط</h2>
          <div class="table-wrap">
            <table>
              <thead><tr><th>العميل</th><th>الدور / الشقة</th><th>مدة الإقامة</th><th>الرابط / QR</th><th>الإجراءات</th></tr></thead>
              <tbody>${renderGuestsRows()}</tbody>
            </table>
          </div>
        </section>

        <div class="footer-note">${RIGHTS}</div>
      </div>
    </main>
  `;
}

function renderServicesRows(){
  if (!state.services.length) return '<tr><td colspan="4">لا توجد خدمات حتى الآن</td></tr>';
  return state.services.map(s => `
    <tr>
      <td><strong>${esc(s.label)}</strong></td>
      <td>${esc(s.type)}</td>
      <td>${s.enabled === false ? "معطلة" : "مفعلة"}</td>
      <td><div class="table-actions">
        <button class="btn btn-soft" onclick="toggleService('${esc(s.id)}')">${s.enabled === false ? "تفعيل" : "تعطيل"}</button>
        <button class="btn btn-danger" onclick="deleteService('${esc(s.id)}')">حذف</button>
      </div></td>
    </tr>
  `).join("");
}

function renderUnitsRows(){
  if (!state.units.length) return '<tr><td colspan="4">لا توجد شقق / وحدات حتى الآن</td></tr>';
  return state.units.map(u => `
    <tr>
      <td><strong>${esc(u.floor)}</strong><br><span style="color:var(--muted)">شقة ${esc(u.name)}</span></td>
      <td>${esc(u.wifi)}<br><span style="color:var(--muted)">${esc(u.password)}</span></td>
      <td>${esc(u.checkIn)}<br><span style="color:var(--muted)">${esc(u.checkOut)}</span></td>
      <td><button class="btn btn-danger" onclick="deleteUnit('${esc(u.id)}')">حذف</button></td>
    </tr>
  `).join("");
}

function renderGuestsRows(){
  if (!state.guests.length) return '<tr><td colspan="5">لا يوجد مستأجرون حتى الآن</td></tr>';
  return state.guests.map(g => {
    const payload = buildGuestPayload(g);
    const link = guestUrl(payload);
    const unit = payload.unit;
    return `
      <tr>
        <td><strong>${esc(g.name)}</strong><br><span style="color:var(--muted)">${esc(g.phone)}</span></td>
        <td>${esc(unitDisplay(unit))}</td>
        <td>${esc(g.checkInDate || "-")}<br><span style="color:var(--muted)">${esc(g.checkOutDate || "-")}</span></td>
        <td><a href="${link}" target="_blank">فتح الرابط</a><br><img class="qr-img" alt="QR" src="${qrUrl(link)}"></td>
        <td><div class="table-actions">
          <button class="btn btn-primary" onclick="copyGuestLink('${esc(g.id)}')">نسخ الرابط</button>
          <button class="btn btn-soft" onclick="printGuestQr('${esc(g.id)}')">طباعة QR</button>
          <button class="btn btn-success" onclick="sendWelcome('${esc(g.id)}')">ترحيب واتساب</button>
          <button class="btn btn-danger" onclick="deleteGuest('${esc(g.id)}')">حذف</button>
        </div></td>
      </tr>
    `;
  }).join("");
}

function saveProperty(){
  state.property = {
    name: q("propertyName").value.trim() || "منشأة جديدة",
    type: q("propertyType").value,
    phone: q("propertyPhone").value.trim(),
    frontDeskPhone: q("frontDeskPhone").value.trim(),
    emergencyPhone: q("emergencyPhone").value.trim(),
    locationUrl: q("locationUrl").value.trim(),
    feedbackUrl: q("feedbackUrl").value.trim()
  };
  saveState();
  showStatus("تم حفظ بيانات المنشأة");
  renderAdmin();
}

function saveFixedContent(){
  state.rules = splitLines(q("rulesInput").value);
  state.instructions = splitLines(q("instructionsInput").value);
  if (!state.rules.length) state.rules = clone(DEFAULT_STATE.rules);
  if (!state.instructions.length) state.instructions = clone(DEFAULT_STATE.instructions);
  saveState();
  showStatus("تم حفظ القوانين والتعليمات");
  renderAdmin();
}

function addService(){
  const label = q("serviceLabel").value.trim();
  const type = q("serviceType").value.trim();
  if (!label || !type) return alert("أدخل اسم الزر ونوع الطلب");
  state.services.push({id:uid("srv"), label, type, enabled:true});
  saveState();
  showStatus("تمت إضافة الخدمة");
  renderAdmin();
}

function toggleService(id){
  const s = state.services.find(x => x.id === id);
  if (!s) return;
  s.enabled = s.enabled === false ? true : false;
  saveState();
  renderAdmin();
}

function deleteService(id){
  if (!confirm("حذف هذه الخدمة؟")) return;
  state.services = state.services.filter(s => s.id !== id);
  saveState();
  renderAdmin();
}

function addUnit(){
  const floor = q("unitFloor").value.trim();
  const name = q("unitName").value.trim();
  const wifi = q("unitWifi").value.trim();
  const password = q("unitPass").value.trim();
  if (!name || !wifi || !password) return alert("أدخل الدور ورقم الشقة والواي فاي وكلمة المرور");
  state.units.push({
    id: uid("unit"),
    floor: floor || "-",
    name,
    wifi,
    password,
    checkIn: q("unitCheckIn").value.trim() || "3:00 مساءً",
    checkOut: q("unitCheckOut").value.trim() || "12:00 ظهرًا"
  });
  saveState();
  showStatus("تم حفظ الشقة / الوحدة");
  renderAdmin();
}

function deleteUnit(id){
  if (!confirm("حذف الشقة / الوحدة؟")) return;
  state.units = state.units.filter(u => u.id !== id);
  saveState();
  renderAdmin();
}

function addGuest(){
  if (!state.units.length) return alert("أضف شقة / وحدة أولًا");
  const name = q("guestName").value.trim();
  const phone = q("guestPhone").value.trim();
  const unitId = q("guestUnit").value;
  const unit = findUnit(unitId);
  const checkInDate = q("guestCheckInDate").value;
  const checkOutDate = q("guestCheckOutDate").value;

  if (!name || !phone || !checkOutDate) return alert("أدخل اسم العميل، رقم الجوال، وتاريخ الخروج");
  if (!unit) return alert("اختر شقة صحيحة للمستأجر");

  state.guests.push({
    id: uid("guest"),
    name,
    phone,
    unitId,
    unitSnapshot: clone(unit),
    checkInDate,
    checkOutDate,
    createdAt: Date.now()
  });

  saveState();
  showStatus("تم حفظ المستأجر وظهر في جدول المستأجرين");
  renderAdmin();

  setTimeout(() => {
    const target = Array.from(document.querySelectorAll(".section-title")).find(x => x.textContent.includes("المستأجرون"));
    if (target) target.scrollIntoView({behavior:"smooth", block:"start"});
  }, 100);
}

function deleteGuest(id){
  if (!confirm("حذف المستأجر؟")) return;
  state.guests = state.guests.filter(g => g.id !== id);
  saveState();
  renderAdmin();
}

async function copyGuestLink(id){
  const guest = state.guests.find(g => g.id === id);
  if (!guest) return alert("لم يتم العثور على المستأجر");
  const link = guestUrl(buildGuestPayload(guest));
  try {
    await navigator.clipboard.writeText(link);
    showStatus("تم نسخ رابط الضيف");
  } catch (e) {
    prompt("انسخ الرابط:", link);
  }
}

function sendWelcome(id){
  const guest = state.guests.find(g => g.id === id);
  if (!guest) return alert("لم يتم العثور على المستأجر");
  const link = guestUrl(buildGuestPayload(guest));
  window.open(whatsappLink(guest.phone, fixedWelcomeMessage(guest, link)), "_blank");
}

function printGuestQr(id){
  const guest = state.guests.find(g => g.id === id);
  if (!guest) return alert("لم يتم العثور على المستأجر");
  const payload = buildGuestPayload(guest);
  const link = guestUrl(payload);
  const win = window.open("", "_blank");
  win.document.write(`
    <!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8">
    <title>QR الضيف - HostFlow AI</title>
    <style>body{font-family:Arial,sans-serif;text-align:center;padding:32px;color:#162033}.card{border:1px solid #d9e2ec;border-radius:18px;padding:28px;max-width:420px;margin:auto}img{width:240px;height:240px;margin:18px 0}.muted{color:#667085}@media print{button{display:none}}</style>
    </head><body><button onclick="window.print()">طباعة / حفظ PDF</button>
    <div class="card"><h1>${esc(state.property.name)}</h1><p>امسح الرمز للدخول إلى صفحة الضيف</p>
    <img src="${qrUrl(link,240)}" alt="QR"><h2>${esc(unitDisplay(payload.unit))}</h2>
    <p class="muted">خاص بالضيف: ${esc(guest.name)}</p><p class="muted">${RIGHTS}</p></div></body></html>
  `);
  win.document.close();
}

function printGuestsPdf(){
  const rows = state.guests.map((g,i) => {
    const unit = g.unitSnapshot || findUnit(g.unitId) || {};
    return `<tr>
      <td>${i+1}</td><td>${esc(g.name)}</td><td>${esc(g.phone)}</td>
      <td>${esc(unit.floor || "-")}</td><td>${esc(unit.name || "-")}</td>
      <td>${esc(g.checkInDate || "-")}</td><td>${esc(g.checkOutDate || "-")}</td>
      <td>${esc(new Date(g.createdAt || Date.now()).toLocaleString("ar-SA"))}</td>
    </tr>`;
  }).join("");

  const win = window.open("", "_blank");
  win.document.write(`
    <!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8">
    <title>تقرير المستأجرين - HostFlow AI</title>
    <style>body{font-family:Arial,sans-serif;padding:28px;color:#162033}h1{margin-bottom:6px}.meta{color:#667085;margin-bottom:24px;line-height:1.8}table{width:100%;border-collapse:collapse}th,td{border:1px solid #d9e2ec;padding:10px;text-align:right;vertical-align:top}th{background:#f4f7fb}.footer{margin-top:24px;color:#667085;font-size:12px}.brand{border-bottom:3px solid #0f172a;padding-bottom:12px;margin-bottom:20px}@media print{button{display:none}}</style>
    </head><body><button onclick="window.print()">طباعة / حفظ PDF</button>
    <div class="brand"><h1>تقرير المستأجرين</h1><div class="meta">المنشأة: ${esc(state.property.name)}<br>نوع المنشأة: ${esc(state.property.type)}<br>تاريخ التقرير: ${new Date().toLocaleString("ar-SA")}<br>${RIGHTS}</div></div>
    <table><thead><tr><th>#</th><th>اسم المستأجر</th><th>الجوال</th><th>الدور</th><th>الشقة</th><th>تاريخ الدخول</th><th>تاريخ الخروج</th><th>وقت التسجيل</th></tr></thead>
    <tbody>${rows || `<tr><td colspan="8">لا يوجد مستأجرون حتى الآن</td></tr>`}</tbody></table>
    <div class="footer">${RIGHTS}</div></body></html>
  `);
  win.document.close();
}

function renderGuest(payload){
  if (!payload || !payload.guest || !payload.unit || !payload.property) return renderError("رابط غير صالح. يرجى التواصل مع المنشأة.");
  payload.rules = Array.isArray(payload.rules) ? payload.rules : DEFAULT_STATE.rules;
  payload.instructions = Array.isArray(payload.instructions) ? payload.instructions : DEFAULT_STATE.instructions;
  payload.services = Array.isArray(payload.services) ? payload.services : DEFAULT_STATE.services;

  if (payload.guest.checkOutDate && todayText() > payload.guest.checkOutDate) return renderError("انتهت صلاحية هذا الرابط. يرجى التواصل مع المنشأة.");

  document.documentElement.lang = "ar";
  document.documentElement.dir = "rtl";
  q("app").innerHTML = `
    <div class="topbar"><div class="container topbar-inner"><div><div class="brand">HostFlow AI</div><div class="subbrand">صفحة الضيف - ${esc(payload.property.name)}</div></div></div></div>
    <header class="hero"><div class="container"><div class="hero-grid"><div>
      <h1>👋 أهلًا بك ${esc(payload.guest.name)}</h1><p>نسعد باستضافتك ونتمنى لك إقامة مريحة ومميزة.</p>
      <div class="chip-row"><div class="chip">🏨 ${esc(payload.property.name)}</div><div class="chip">🏢 ${esc(unitDisplay(payload.unit))}</div><div class="chip">كل ما تحتاجه موجود هنا</div></div>
    </div><div class="hero-card"><ul class="hero-list"><li>📶 بيانات الواي فاي الخاصة بالشقة</li><li>🔑 تعليمات الدخول والإقامة</li><li>🛎️ طلب الخدمات بضغطة واحدة</li><li>🚨 أرقام التواصل والطوارئ</li><li>⭐ تقييم التجربة بعد الإقامة</li></ul></div></div></div></header>
    <main><div class="container">
      <div class="grid-2"><section class="card"><h2 class="section-title">المعلومات الأساسية</h2>
        <div class="info-grid"><div class="info-box"><strong>الدور</strong>${esc(payload.unit.floor || "-")}</div><div class="info-box"><strong>رقم الشقة</strong>${esc(payload.unit.name || "-")}</div><div class="info-box"><strong>اسم الشبكة</strong>${esc(payload.unit.wifi || "-")}</div><div class="info-box"><strong>كلمة المرور</strong>${esc(payload.unit.password || "-")}</div><div class="info-box"><strong>الخروج</strong>${esc(payload.unit.checkOut || "-")}</div></div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;"><a class="btn btn-primary" href="${esc(payload.property.locationUrl || "#")}" target="_blank">📍 فتح الموقع</a><a class="btn btn-soft" href="tel:${cleanPhone(payload.property.frontDeskPhone || payload.property.phone)}">☎️ الاستقبال</a></div>
      </section><section class="card"><h2 class="section-title">تعليمات الدخول</h2><ol class="steps">${payload.instructions.map(x=>`<li>${esc(x)}</li>`).join("")}</ol></section></div>
      <section class="card"><h2 class="section-title">طلب خدمة</h2><div class="section-subtitle">اختر الخدمة المطلوبة وسيتم فتح رسالة واتساب جاهزة للمنشأة.</div><div class="action-grid">${payload.services.map(s=>`<a class="btn btn-soft" target="_blank" href="${whatsappLink(payload.property.phone, serviceMessage(payload, s.type))}">${esc(s.label)}</a>`).join("")}</div></section>
      <div class="grid-2"><section class="card"><h2 class="section-title">القوانين</h2><ul class="rules-list">${payload.rules.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></section>
      <section class="card"><h2 class="section-title">الطوارئ والتقييم</h2><p class="section-subtitle">في الحالات الطارئة يرجى التواصل فورًا.</p><div style="display:flex;gap:12px;flex-wrap:wrap;"><a class="btn btn-danger" href="tel:${cleanPhone(payload.property.emergencyPhone || payload.property.phone)}">🚨 اتصال طارئ</a>${payload.property.feedbackUrl ? `<a class="btn btn-success" href="${esc(payload.property.feedbackUrl)}" target="_blank">⭐ قيّم تجربتك</a>` : ""}</div></section></div>
      <div class="footer-note">${RIGHTS}</div>
    </div></main>
  `;
}

function renderError(message){
  q("app").innerHTML = `<main><div class="container"><section class="card" style="margin-top:70px;text-align:center;"><h2>${esc(message)}</h2><p class="section-subtitle">HostFlow AI</p></section></div></main>`;
}

document.addEventListener("contextmenu", e => e.preventDefault());
render();
</script>
</body>
</html>
