<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HostFlow AI</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #162033;
      --muted: #667085;
      --line: #e6ecf3;
      --primary: #1f6feb;
      --primary-soft: #eef4ff;
      --primary-dark: #1558b8;
      --success: #0f766e;
      --success-soft: #ecfeff;
      --danger: #dc2626;
      --danger-soft: #fff1f2;
      --dark: #0f172a;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    a { color: inherit; }
    .container { width: min(1240px, calc(100% - 28px)); margin: 0 auto; }
    .topbar {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(15, 23, 42, 0.96);
      backdrop-filter: blur(12px);
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .topbar-inner {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .brand { font-weight: 800; font-size: 1.1rem; }
    .subbrand { font-size: 0.85rem; color: rgba(255,255,255,0.78); margin-top: 3px; }
    .top-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .pill {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px; min-height: 42px; padding: 10px 14px;
      border-radius: 999px; border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08); color: #fff;
      cursor: pointer; font-weight: 700; text-decoration: none;
    }
    .hero {
      background: linear-gradient(135deg, #0f172a, #1e293b 45%, #334155);
      color: #fff;
      padding: 30px 0 42px;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1.25fr 0.95fr;
      gap: 20px;
      align-items: stretch;
    }
    .hero h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3.3rem);
      line-height: 1.12;
      letter-spacing: -0.02em;
    }
    .hero p { margin: 0 0 12px; color: rgba(255,255,255,0.9); max-width: 760px; }
    .hero-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 22px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }
    .hero-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 10px; font-size: 0.96rem; }
    .hero-list li { display: flex; gap: 10px; align-items: center; }
    main { padding: 24px 0 60px; }
    .notice {
      background: #fff8e6;
      color: #7a5b00;
      border: 1px solid #f4df9b;
      padding: 14px 16px;
      border-radius: 14px;
      margin-bottom: 18px;
    }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      margin-bottom: 18px;
    }
    .section-title { margin: 0 0 12px; font-size: 1.18rem; font-weight: 800; }
    .section-subtitle { margin: -4px 0 14px; color: var(--muted); font-size: 0.95rem; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label { font-size: 0.94rem; font-weight: 700; }
    .field input, .field textarea, .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }
    .field textarea { min-height: 110px; resize: vertical; }
    .hint { color: var(--muted); font-size: 0.84rem; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px; min-height: 48px; padding: 12px 16px;
      border-radius: 14px; border: 1px solid transparent;
      text-decoration: none; cursor: pointer; font-weight: 800;
      font: inherit; transition: 0.2s ease; text-align: center;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-soft { background: var(--primary-soft); color: var(--primary-dark); border-color: #d8e6ff; }
    .btn-success { background: var(--success-soft); color: var(--success); border-color: #d0f5f0; }
    .btn-danger { background: var(--danger-soft); color: var(--danger); border-color: #ffd8df; }
    .btn-dark { background: var(--dark); color: #fff; }
    .kpis { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; }
    .kpi { background: #fafcff; border: 1px solid var(--line); border-radius: 16px; padding: 16px; }
    .kpi .label { color: var(--muted); font-size: 0.88rem; margin-bottom: 6px; }
    .kpi .value { font-size: 1.5rem; font-weight: 800; line-height: 1.1; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 14px; }
    table { width: 100%; border-collapse: collapse; background: #fff; min-width: 860px; }
    th, td { padding: 12px 14px; border-bottom: 1px solid var(--line); text-align: right; vertical-align: top; font-size: 0.95rem; }
    th { background: #fafcff; font-weight: 800; white-space: nowrap; }
    tr:last-child td { border-bottom: 0; }
    .table-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      font-size: 0.92rem;
    }
    .info-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .info-box { background: #fafcff; border: 1px solid var(--line); border-radius: 14px; padding: 14px; }
    .info-box strong { display: block; margin-bottom: 4px; }
    .steps, .rules-list { margin: 0; padding-right: 18px; color: var(--muted); }
    .steps li, .rules-list li { margin-bottom: 10px; }
    .action-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .status-box {
      position: fixed; bottom: 20px; right: 20px; z-index: 1200;
      background: #0f172a; color: #fff; padding: 14px 16px;
      border-radius: 14px; box-shadow: 0 20px 40px rgba(15,23,42,0.25);
      display: none; max-width: 380px;
    }
    .status-box.show { display: block; }
    .footer-note { text-align: center; color: var(--muted); margin-top: 20px; }
    @media (max-width: 1100px) {
      .hero-grid, .grid-2, .grid-3, .kpis, .info-grid, .action-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="status-box" id="statusBox"></div>

  <datalist id="guestNameSuggestions">
    <option value="اسم العميل"></option>
    <option value="ضيف رقم 1"></option>
  </datalist>
  <datalist id="floorSuggestions">
    <option value="الدور الأرضي"></option>
    <option value="الدور الأول"></option>
    <option value="الدور الثاني"></option>
    <option value="الدور الثالث"></option>
  </datalist>
  <datalist id="apartmentSuggestions">
    <option value="101"></option>
    <option value="102"></option>
    <option value="201"></option>
    <option value="204"></option>
  </datalist>
  <datalist id="wifiSuggestions">
    <option value="Future-101"></option>
    <option value="HotelWiFi"></option>
    <option value="Guest-WiFi"></option>
  </datalist>
  <datalist id="checkInSuggestions">
    <option value="3:00 مساءً"></option>
    <option value="4:00 مساءً"></option>
  </datalist>
  <datalist id="checkOutSuggestions">
    <option value="12:00 ظهرًا"></option>
    <option value="1:00 مساءً"></option>
  </datalist>
  <datalist id="serviceLabelSuggestions">
    <option value="🧺 طلب غسيل"></option>
    <option value="🍽️ طلب أدوات مطبخ"></option>
    <option value="🚗 طلب موقف"></option>
  </datalist>
  <datalist id="serviceTypeSuggestions">
    <option value="غسيل ملابس"></option>
    <option value="أدوات مطبخ"></option>
    <option value="مساعدة بخصوص الموقف"></option>
  </datalist>


  <script>
    const RIGHTS = "HostFlow AI © 2026 Abdulrahman Shrahily. All Rights Reserved.";
    const STORAGE_KEY = "hostflow_clean_v5";

    function clone(obj) { return JSON.parse(JSON.stringify(obj)); }

    const DEFAULT_DATA = {
      property: {
        name: "منشأة المستقبل",
        type: "شقق مفروشة",
        phone: "966500000000",
        frontDeskPhone: "966500000000",
        emergencyPhone: "966500000000",
        locationUrl: "https://maps.google.com",
        feedbackUrl: "",
        heroTitle: "كل ما يحتاجه الضيف خلال إقامته",
        heroDesc: "كل شيء في مكان واحد وبدون مكالمات متكررة."
      },
      rules: [
        "يمنع الإزعاج بعد الساعة 10 مساءً.",
        "يمنع التدخين داخل الوحدة.",
        "يرجى المحافظة على نظافة المكان.",
        "الالتزام بوقت تسجيل الخروج.",
        "في حال وجود أي مشكلة، يرجى استخدام زر طلب المساعدة."
      ],
      instructions: [
        "تأكد من رقم الشقة والدور قبل الدخول.",
        "استخدم بيانات الدخول المرسلة لك من المنشأة.",
        "تأكد من إغلاق الباب جيدًا عند الخروج."
      ],
      services: [
        { label: "🧹 طلب تنظيف", type: "تنظيف", enabled: true },
        { label: "🛁 طلب مناشف", type: "مناشف", enabled: true },
        { label: "❄️ مشكلة في التكييف", type: "مشكلة في التكييف", enabled: true },
        { label: "🔧 طلب صيانة", type: "صيانة", enabled: true },
        { label: "❓ طلب مساعدة", type: "مساعدة", enabled: true }
      ],
      units: [],
      guests: [],
      auditLog: []
    };

    let db = loadData();

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return clone(DEFAULT_DATA);
        const parsed = JSON.parse(raw);
        return normalizeDb(parsed);
      } catch (e) {
        try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
        return clone(DEFAULT_DATA);
      }
    }

    function normalizeDb(data) {
      const merged = clone(DEFAULT_DATA);
      Object.assign(merged.property, data.property || {});
      merged.rules = Array.isArray(data.rules) ? data.rules : merged.rules;
      merged.instructions = Array.isArray(data.instructions) ? data.instructions : merged.instructions;
      merged.services = Array.isArray(data.services) ? data.services.map(s => ({
        label: s.label || "خدمة",
        type: s.type || s.label || "خدمة",
        enabled: s.enabled !== false
      })) : merged.services;
      merged.units = Array.isArray(data.units) ? data.units.map(u => ({
        floor: u.floor || "-",
        name: u.name || "-",
        wifi: u.wifi || "-",
        password: u.password || "-",
        checkIn: u.checkIn || "3:00 مساءً",
        checkOut: u.checkOut || "12:00 ظهرًا"
      })) : [];
      merged.guests = Array.isArray(data.guests) ? data.guests.map(g => ({
        name: g.name || "-",
        phone: g.phone || "",
        unitIndex: Number.isInteger(g.unitIndex) ? g.unitIndex : 0,
        checkInDate: g.checkInDate || "",
        checkOutDate: g.checkOutDate || "",
        id: g.id || ("guest-" + (g.createdAt || Date.now())),
        unitSnapshot: g.unitSnapshot || null,
        createdAt: g.createdAt || Date.now()
      })) : [];
      merged.auditLog = Array.isArray(data.auditLog) ? data.auditLog : [];
      return merged;
    }

    function saveData() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch (e) { console.error("Save failed", e); } }
    function q(id) { return document.getElementById(id); }

    function showStatus(msg) {
      const box = q("statusBox");
      if (!box) return;
      box.textContent = msg;
      box.classList.add("show");
      clearTimeout(showStatus._t);
      showStatus._t = setTimeout(() => box.classList.remove("show"), 2600);
    }

    function addAudit(action, details = {}) {
      if (!Array.isArray(db.auditLog)) db.auditLog = [];
      db.auditLog.unshift({
        action,
        details,
        time: new Date().toLocaleString("ar-SA"),
        timestamp: new Date().toISOString()
      });
      db.auditLog = db.auditLog.slice(0, 300);
      saveData();
    }

    function showLegalLog() {
      const logs = Array.isArray(db.auditLog) ? db.auditLog : [];
      if (!logs.length) return alert("لا يوجد سجل حتى الآن.");
      const text = logs.map((log, i) => {
        const d = log.details || {};
        const details = Object.keys(d).map(k => `${k}: ${d[k]}`).join("\\n");
        return `${i + 1}) ${log.time}\\nالإجراء: ${log.action}\\n${details}`;
      }).join("\\n\\n----------------------\\n\\n");
      alert(text);
    }

    function cleanPhone(phone) { return String(phone || "").replace(/[^\\d]/g, ""); }

    function encodePayload(obj) {
      const json = JSON.stringify(obj);
      const utf8 = encodeURIComponent(json).replace(/%([0-9A-F]{2})/g, (_, p1) => String.fromCharCode(parseInt(p1, 16)));
      return btoa(utf8).replace(/\\+/g, "-").replace(/\\//g, "_").replace(/=+$/g, "");
    }

    function decodePayload(str) {
      try {
        let base64 = String(str || "").replace(/-/g, "+").replace(/_/g, "/");
        while (base64.length % 4) base64 += "=";
        const binary = atob(base64);
        const json = decodeURIComponent(Array.from(binary).map(c => "%" + c.charCodeAt(0).toString(16).padStart(2, "0")).join(""));
        return JSON.parse(json);
      } catch (e) {
        console.error("Payload decode failed", e);
        return null;
      }
    }

    function todayText() { return new Date().toISOString().slice(0, 10); }
    function isExpired(checkOutDate) { return checkOutDate && todayText() > checkOutDate; }

    function guestUrl(payload) {
      const base = window.location.origin + window.location.pathname;
      return `${base}?data=${encodePayload(payload)}`;
    }

    function whatsappLink(phone, message) {
      return `https://wa.me/${cleanPhone(phone)}?text=${encodeURIComponent(message)}`;
    }

    function qrUrl(link, size = 180) {
      return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(link)}`;
    }

    function fixedWelcomeMessage(guest, property, link) {
      return `أهلًا ${guest.name}،\\nنرحب بك في ${property.name} ونتمنى لك إقامة مريحة ومميزة.\\n\\nتم تجهيز صفحة خاصة بك تحتوي على أهم معلومات إقامتك وطلبات الخدمة.\\n\\nرابط الضيف:\\n${link}`;
    }

    function serviceMessage(payload, serviceType) {
      return `السلام عليكم،\\nأنا ${payload.guest.name}\\nالدور: ${payload.unit.floor || "-"}\\nالشقة: ${payload.unit.name}\\nالمنشأة: ${payload.property.name}\\n\\nأرغب بطلب: ${serviceType}\\n\\nشكرًا لكم.`;
    }

    function splitLines(text) {
      return String(text || "").split("\\n").map(x => x.trim()).filter(Boolean);
    }

    function ruleSuggestions() {
      return [
        "يمنع الإزعاج بعد الساعة 10 مساءً.",
        "يمنع التدخين داخل الشقة.",
        "يرجى المحافظة على نظافة المكان.",
        "يمنع إقامة الحفلات أو التجمعات بدون إذن.",
        "الالتزام بوقت تسجيل الخروج.",
        "أي تلف أو ضرر يتم إبلاغ الإدارة عنه فورًا."
      ];
    }

    function instructionSuggestions() {
      return [
        "تأكد من رقم الشقة والدور قبل الدخول.",
        "استخدم بيانات الدخول المرسلة لك من المنشأة.",
        "تأكد من إغلاق الباب جيدًا عند الدخول والخروج.",
        "احتفظ بمعلومات الواي فاي الموجودة في صفحة الضيف.",
        "في حال وجود أي مشكلة، استخدم زر طلب المساعدة.",
        "عند المغادرة، تأكد من عدم نسيان أي أغراض شخصية."
      ];
    }

    function addSuggestionTo(textareaId, index, type) {
      const items = type === "rule" ? ruleSuggestions() : instructionSuggestions();
      const value = items[index];
      const area = q(textareaId);
      if (!area || !value) return;
      const current = splitLines(area.value);
      if (!current.includes(value)) current.push(value);
      area.value = current.join("\\n");
    }

    function parseDataFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("data");
    }

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[ch]));
    }

    function render() {
      try {
        const encoded = parseDataFromUrl();
        if (encoded) {
          renderGuest(decodePayload(encoded));
        } else {
          renderAdmin();
        }
      } catch (e) {
        console.error("Render failed; resetting local data", e);
        try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
        try {
          db = clone(DEFAULT_DATA);
          saveData();
          renderAdmin();
          setTimeout(() => showStatus("تم تنظيف بيانات قديمة كانت تسبب خطأ في التشغيل"), 200);
        } catch (e2) {
          console.error(e2);
          renderGuestError("حدث خطأ في تشغيل الصفحة. يرجى إعادة تحميل الموقع.");
        }
      }
    }

    function renderAdmin() {
      document.documentElement.lang = "ar";
      document.documentElement.dir = "rtl";
      q("app").innerHTML = `
        <div class="topbar">
          <div class="container topbar-inner">
            <div>
              <div class="brand">HostFlow AI</div>
              <div class="subbrand">لوحة المنشأة - إدارة الوحدات والمستأجرين</div>
            </div>
            <div class="top-actions">
              <button class="pill" onclick="printGuestsPdf()">تقرير PDF</button>
            </div>
          </div>
        </div>

        <header class="hero">
          <div class="container">
            <div class="hero-grid">
              <div>
                <h1>إدارة احترافية للمنشأة</h1>
                <p>لوحة واحدة لإدارة بيانات المنشأة، الشقق، الواي فاي، والمستأجرين، مع رابط ضيف خاص وQR لكل مستأجر ينتهي بعد تاريخ الخروج.</p>
                <p>هذه الواجهة خاصة بالمنشأة فقط. المستأجر يرى صفحة خاصة به عبر الرابط.</p>
              </div>
              <div class="hero-card">
                <ul class="hero-list">
                  <li>🏨 مناسب للشقق والفنادق والفلل والاستراحات</li>
                  <li>🏢 تنظيم الدور ورقم الشقة وبيانات الواي فاي</li>
                  <li>👤 إنشاء صفحة خاصة لكل مستأجر حسب مدة إقامته</li>
                  <li>💬 رسالة ترحيب واتساب راقية تحتوي على رابط الضيف</li>
                  <li>🛎️ خدمات جاهزة للضيف بضغطة واحدة</li>
                  <li>⏳ رابط الضيف ينتهي تلقائيًا بعد تاريخ الخروج</li>
                  <li>🔒 ${RIGHTS}</li>
                </ul>
              </div>
            </div>
          </div>
        </header>

        <main>
          <div class="container">
            <div class="notice">لوحة المنشأة تعمل دائمًا. انتهاء الصلاحية يطبّق فقط على رابط المستأجر بعد تاريخ الخروج.</div>

            <section class="card">
              <h2 class="section-title">ملخص سريع</h2>
              <div class="kpis">
                <div class="kpi"><div class="label">الشقق / الوحدات</div><div class="value">${db.units.length}</div></div>
                <div class="kpi"><div class="label">المستأجرون</div><div class="value">${db.guests.length}</div></div>
                <div class="kpi"><div class="label">الخدمات</div><div class="value">${db.services.filter(s => s.enabled !== false).length}</div></div>
                <div class="kpi"><div class="label">الحالة</div><div class="value">جاهز</div></div>
              </div>
            </section>

            <div class="grid-2">
              <section class="card">
                <h2 class="section-title">بيانات المنشأة</h2>
                <div class="field"><label>اسم المنشأة</label><input id="propertyName" value="${esc(db.property.name)}"></div>
                <div class="field"><label>نوع المنشأة</label>
                  <select id="propertyType">
                    ${["شقق مفروشة","فندق","فيلا","استراحة","شاليه","منتجع"].map(t => `<option ${db.property.type === t ? "selected" : ""}>${t}</option>`).join("")}
                  </select>

                <div class="field"><label>رقم الطوارئ</label><input id="emergencyPhone" value="${esc(db.property.emergencyPhone)}"></div>

                  <label>اقتراحات القوانين الشائعة</label>
                  <div class="table-actions">
                    ${ruleSuggestions().map((x, i) => `<button class="btn btn-soft" type="button" onclick="addSuggestionTo('rulesInput', ${i}, 'rule')">${x}</button>`).join("")}
                  </div>
                </div>
                <div class="field"><label>القوانين المعتمدة</label><textarea id="rulesInput">${esc(db.rules.join("\\n"))}</textarea></div>

                <div class="field">
                  <label>اقتراحات تعليمات الدخول</label>
                  <div class="table-actions">
                    ${instructionSuggestions().map((x, i) => `<button class="btn btn-soft" type="button" onclick="addSuggestionTo('instructionsInput', ${i}, 'instruction')">${x}</button>`).join("")}
                  </div>
                </div>
                <div class="field"><label>تعليمات الدخول المعتمدة</label><textarea id="instructionsInput">${esc(db.instructions.join("\\n"))}</textarea></div>

                <div class="hint">رسالة الترحيب والطلبات ثابتة تلقائيًا، وتتغير فقط باسم العميل والمنشأة والرابط.</div>

            <section class="card">
              <h2 class="section-title">الخدمات التي تظهر للضيف</h2>
              <div class="section-subtitle">هذه الأزرار تظهر في صفحة المستأجر. يمكنك تفعيل أو تعطيل أي خدمة حسب المنشأة.</div>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>الخدمة</th><th>نوع الطلب</th><th>الحالة</th><th>الإجراءات</th></tr></thead>
                  <tbody>${renderServicesRows()}</tbody>
                </table>
              </div>
              <div class="grid-3" style="margin-top:16px;">
                <div class="field"><label>اسم الزر</label><input id="serviceLabel" placeholder="مثال: 🧺 طلب غسيل" list="serviceLabelSuggestions"></div>
                <div class="field"><label>نوع الطلب في الرسالة</label><input id="serviceType" placeholder="مثال: غسيل ملابس" list="serviceTypeSuggestions"></div>
              </div>
              <button class="btn btn-primary" onclick="addService()">إضافة خدمة</button>
            </section>

            <section class="card">
              <h2 class="section-title">إضافة شقة / وحدة</h2>
              <div class="grid-3">
                <div class="field"><label>الدور</label><input id="unitFloor" placeholder="مثال: الدور الأول" list="floorSuggestions"></div>
                <div class="field"><label>رقم الشقة</label><input id="unitName" placeholder="مثال: 101" list="apartmentSuggestions"></div>
                <div class="field"><label>اسم شبكة الواي فاي</label><input id="unitWifi" placeholder="مثال: Future-101" list="wifiSuggestions"></div>
                <div class="field"><label>كلمة المرور</label><input id="unitPass" placeholder="مثال: 12345678"></div>
                <div class="field"><label>وقت الدخول</label><input id="unitCheckIn" placeholder="مثال: 3:00 مساءً" list="checkInSuggestions"></div>
                <div class="field"><label>وقت الخروج</label><input id="unitCheckOut" placeholder="مثال: 12:00 ظهرًا" list="checkOutSuggestions"></div>
              </div>
              <button class="btn btn-primary" onclick="addUnit()">حفظ الشقة / الوحدة</button>
            </section>

            <section class="card">
              <h2 class="section-title">الشقق / الوحدات</h2>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>الدور / الشقة</th><th>الواي فاي</th><th>الدخول / الخروج</th><th>الإجراءات</th></tr></thead>
                  <tbody>${renderUnitsRows()}</tbody>
                </table>
              </div>
            </section>

            <section class="card">
              <h2 class="section-title">إضافة مستأجر</h2>
              <div class="grid-3">
                <div class="field"><label>اسم العميل</label><input id="guestName" placeholder="مثال: عبدالرحمن شراحيلي" list="guestNameSuggestions"></div>
                <div class="field"><label>رقم جوال العميل</label><input id="guestPhone" placeholder="مثال: 9665XXXXXXXX"></div>
                <div class="field"><label>الدور / رقم الشقة</label><select id="guestUnit">${db.units.map((u, i) => `<option value="${i}">${esc(u.floor)} - شقة ${esc(u.name)}</option>`).join("")}</select></div>
                <div class="field"><label>تاريخ الدخول</label><input id="guestCheckInDate" type="date"></div>
                <div class="field"><label>تاريخ الخروج</label><input id="guestCheckOutDate" type="date"></div>

              <h2 class="section-title">المستأجرون والروابط</h2>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>العميل</th><th>الدور / الشقة</th><th>مدة الإقامة</th><th>الرابط / QR</th><th>الإجراءات</th></tr></thead>

                </table>
              </div>

            <div class="footer-note">${RIGHTS}</div>

      `;
    }

    function renderServicesRows() {
      if (!db.services.length) return '<tr><td colspan="4">لا توجد خدمات حتى الآن</td></tr>';
      return db.services.map((s, i) => `
        <tr>
          <td><strong>${esc(s.label)}</strong></td>
          <td>${esc(s.type)}</td>
          <td>${s.enabled === false ? "معطلة" : "مفعلة"}</td>
          <td>
            <div class="table-actions">
              <button class="btn btn-soft" onclick="toggleService(${i})">${s.enabled === false ? "تفعيل" : "تعطيل"}</button>
              <button class="btn btn-danger" onclick="deleteService(${i})">حذف</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    function addService() {
      const label = q("serviceLabel").value.trim();
      const type = q("serviceType").value.trim();
      if (!label || !type) return alert("أدخل اسم الزر ونوع الطلب");
      db.services.push({ label, type, enabled: true });
      addAudit("إضافة خدمة", { الخدمة: label, النوع: type });
      saveData();
      showStatus("تمت إضافة الخدمة");
      renderAdmin();
    }

    function toggleService(i) {
      if (!db.services[i]) return;
      db.services[i].enabled = db.services[i].enabled === false ? true : false;
      addAudit("تغيير حالة خدمة", { الخدمة: db.services[i].label, الحالة: db.services[i].enabled ? "مفعلة" : "معطلة" });
      saveData();
      renderAdmin();
    }

    function deleteService(i) {
      if (!confirm("حذف هذه الخدمة؟")) return;
      const removed = db.services[i];
      db.services.splice(i, 1);
      addAudit("حذف خدمة", { الخدمة: removed?.label || "-" });
      saveData();
      renderAdmin();
    }

    function renderUnitsRows() {
      if (!db.units.length) return '<tr><td colspan="4">لا توجد شقق / وحدات حتى الآن</td></tr>';
      return db.units.map((u, i) => `
        <tr>
          <td><strong>${esc(u.floor)}</strong><br><span style="color:var(--muted)">شقة ${esc(u.name)}</span></td>
          <td>${esc(u.wifi)}<br><span style="color:var(--muted)">${esc(u.password)}</span></td>
          <td>${esc(u.checkIn)}<br><span style="color:var(--muted)">${esc(u.checkOut)}</span></td>
          <td><button class="btn btn-danger" onclick="deleteUnit(${i})">حذف</button></td>
        </tr>
      `).join("");
    }

    function renderGuestsRows() {
      if (!db.guests.length) return '<tr><td colspan="5">لا يوجد مستأجرون حتى الآن</td></tr>';
      return db.guests.map((g, i) => {
        const unit = g.unitSnapshot || db.units[g.unitIndex] || {};
        const payload = buildGuestPayload(g, unit);
        const link = guestUrl(payload);
        return `
          <tr>
            <td><strong>${esc(g.name)}</strong><br><span style="color:var(--muted)">${esc(g.phone)}</span></td>
            <td>${esc(unit.floor || "-")} - شقة ${esc(unit.name || "-")}</td>
            <td>${esc(g.checkInDate || "-")}<br><span style="color:var(--muted)">${esc(g.checkOutDate || "-")}</span></td>
            <td>
              <a href="${link}" target="_blank">فتح الرابط</a><br>
              <img alt="QR" src="${qrUrl(link)}" style="width:90px;height:90px;margin-top:8px;border:1px solid var(--line);border-radius:10px;padding:5px;background:#fff;">
            </td>
            <td>
              <div class="table-actions">
                <button class="btn btn-primary" onclick="copyGuestLink(${i})">نسخ الرابط</button>
                <button class="btn btn-soft" onclick="printGuestQr(${i})">طباعة QR</button>
                <button class="btn btn-success" onclick="sendWelcome(${i})">ترحيب واتساب</button>
                <button class="btn btn-danger" onclick="deleteGuest(${i})">حذف</button>
              </div>
            </td>
          </tr>
        `;
      }).join("");
    }

    function saveProperty() {
      db.property = {
        name: q("propertyName").value.trim() || "منشأة جديدة",
        type: q("propertyType").value,
        phone: q("propertyPhone").value.trim(),
        frontDeskPhone: q("frontDeskPhone").value.trim(),
        emergencyPhone: q("emergencyPhone").value.trim(),
        locationUrl: q("locationUrl").value.trim(),
        feedbackUrl: q("feedbackUrl").value.trim(),
        heroTitle: DEFAULT_DATA.property.heroTitle,
        heroDesc: DEFAULT_DATA.property.heroDesc
      };
      saveData();
      addAudit("حفظ بيانات المنشأة", { المنشأة: db.property.name, النوع: db.property.type });
      showStatus("تم حفظ بيانات المنشأة");
      renderAdmin();
    }

    function saveFixedContent() {
      db.rules = splitLines(q("rulesInput").value);
      db.instructions = splitLines(q("instructionsInput").value);
      if (!db.rules.length) db.rules = structuredClone(DEFAULT_DATA.rules);
      if (!db.instructions.length) db.instructions = structuredClone(DEFAULT_DATA.instructions);
      saveData();
      addAudit("حفظ القوانين والتعليمات", { عدد_القوانين: db.rules.length, عدد_التعليمات: db.instructions.length });
      showStatus("تم حفظ القوانين والتعليمات");
      renderAdmin();
    }

    function addUnit() {
      const floor = q("unitFloor").value.trim();
      const name = q("unitName").value.trim();
      const wifi = q("unitWifi").value.trim();
      const password = q("unitPass").value.trim();
      if (!name || !wifi || !password) return alert("أدخل الدور ورقم الشقة والواي فاي وكلمة المرور");
      db.units.push({
        floor: floor || "-",
        name,
        wifi,
        password,
        checkIn: q("unitCheckIn").value.trim() || "3:00 مساءً",
        checkOut: q("unitCheckOut").value.trim() || "12:00 ظهرًا"
      });
      addAudit("إضافة شقة / وحدة", { الدور: floor || "-", الشقة: name, الواي_فاي: wifi });
      saveData();
      showStatus("تم حفظ الشقة / الوحدة");
      renderAdmin();
    }

    function deleteUnit(i) {
      if (!confirm("حذف الشقة / الوحدة؟")) return;
      const removed = db.units[i];
      db.units.splice(i, 1);
      addAudit("حذف شقة / وحدة", { الدور: removed?.floor || "-", الشقة: removed?.name || "-" });
      saveData();
      renderAdmin();
    }

    function addGuest() {
      if (!Array.isArray(db.guests)) db.guests = [];
      if (!db.units.length) return alert("أضف شقة / وحدة أولًا");

      const name = q("guestName").value.trim();
      const phone = q("guestPhone").value.trim();
      const unitIndex = Number(q("guestUnit").value);
      const checkInDate = q("guestCheckInDate").value;
      const checkOutDate = q("guestCheckOutDate").value;

      if (!name || !phone || !checkOutDate) {
        return alert("أدخل اسم العميل، رقم الجوال، وتاريخ الخروج");
      }

      if (!Number.isInteger(unitIndex) || !db.units[unitIndex]) {
        return alert("اختر شقة صحيحة للمستأجر");
      }

      const unitSnapshot = {
        floor: db.units[unitIndex].floor || "-",
        name: db.units[unitIndex].name || "-",
        wifi: db.units[unitIndex].wifi || "-",
        password: db.units[unitIndex].password || "-",
        checkIn: db.units[unitIndex].checkIn || "3:00 مساءً",
        checkOut: db.units[unitIndex].checkOut || "12:00 ظهرًا"
      };

      const guest = {
        id: "guest-" + Date.now(),
        name,
        phone,
        unitIndex,
        unitSnapshot,
        checkInDate,
        checkOutDate,
        createdAt: Date.now()
      };

      db.guests.push(guest);
      saveData();

      addAudit("إضافة مستأجر", {
        العميل: name,
        الجوال: phone,
        الدور: unitSnapshot.floor,
        الشقة: unitSnapshot.name,
        من: checkInDate || "-",
        إلى: checkOutDate
      });

      saveData();
      showStatus("تم حفظ المستأجر وظهر في جدول المستأجرين");
      renderAdmin();

      setTimeout(() => {
        const titles = Array.from(document.querySelectorAll(".section-title"));
        const target = titles.find(x => x.textContent.includes("المستأجرون"));
        if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 100);
    }

    function deleteGuest(i) {
      if (!confirm("حذف المستأجر؟")) return;
      const removedGuest = db.guests[i];
      db.guests.splice(i, 1);
      addAudit("حذف مستأجر", { العميل: removedGuest?.name || "-", الجوال: removedGuest?.phone || "-" });
      saveData();
      renderAdmin();
    }

    function buildGuestPayload(guest, unit) {
      const safeUnit = {
        floor: unit.floor || "-",
        name: unit.name || "-",
        wifi: unit.wifi || "-",
        password: unit.password || "-",
        checkIn: unit.checkIn || "3:00 مساءً",
        checkOut: unit.checkOut || "12:00 ظهرًا"
      };
      return {
        property: db.property,
        guest,
        unit: safeUnit,
        rules: db.rules,
        instructions: db.instructions,
        services: db.services.filter(s => s.enabled !== false),
        rights: RIGHTS
      };
    }

    async function copyGuestLink(i) {
      const guest = db.guests[i];
      const unit = db.units[guest.unitIndex] || {};
      const link = guestUrl(buildGuestPayload(guest, unit));
      try {
        await navigator.clipboard.writeText(link);
        addAudit("نسخ رابط الضيف", { العميل: guest.name, الشقة: unit?.name || "-" });
        showStatus("تم نسخ رابط الضيف");
      } catch (e) {
        prompt("انسخ الرابط:", link);
      }
    }

    function sendWelcome(i) {
      const guest = db.guests[i];
      const unit = db.units[guest.unitIndex] || {};
      const link = guestUrl(buildGuestPayload(guest, unit));
      const msg = fixedWelcomeMessage(guest, db.property, link);
      addAudit("إرسال رسالة ترحيب واتساب", { العميل: guest.name, الجوال: guest.phone });
      window.open(whatsappLink(guest.phone, msg), "_blank");
    }

      const unit = db.units[guest.unitIndex] || {};
      const link = guestUrl(buildGuestPayload(guest, unit));

            <img src="${qrUrl(link, 240)}" alt="QR">
            <h2>${esc(unit.floor || "-")} - شقة ${esc(unit.name || "-")}</h2>
            <p class="muted">خاص بالضيف: ${esc(guest.name)}</p>
            <p class="muted">${RIGHTS}</p>
          </div>
        </body>
        </html>
      `);
      win.document.close();
      addAudit("طباعة QR للضيف", { العميل: guest.name, الشقة: unit.name || "-" });
    }


    function loadDemo() {
      db = clone(DEFAULT_DATA);
      db.units = [
        { floor: "الدور الأول", name: "101", wifi: "Future-101", password: "12345678", checkIn: "3:00 مساءً", checkOut: "12:00 ظهرًا" },
        { floor: "الدور الثاني", name: "204", wifi: "Future-204", password: "87654321", checkIn: "3:00 مساءً", checkOut: "12:00 ظهرًا" }
      ];
      saveData();
      renderAdmin();
      showStatus("تم تحميل المثال");
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(db, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "hostflow-backup.json";
      a.click();
      URL.revokeObjectURL(url);
      showStatus("تم تحميل نسخة احتياطية بصيغة JSON");
    }

    function renderGuest(payload) {
      if (!payload || !payload.guest || !payload.unit || !payload.property) {
        return renderGuestError("رابط غير صالح. يرجى التواصل مع المنشأة.");
      }
      payload.unit.floor = payload.unit.floor || "-";
      payload.unit.name = payload.unit.name || "-";
      payload.unit.wifi = payload.unit.wifi || "-";
      payload.unit.password = payload.unit.password || "-";
      payload.unit.checkOut = payload.unit.checkOut || "-";
      if (!Array.isArray(payload.rules)) payload.rules = DEFAULT_DATA.rules;
      if (!Array.isArray(payload.instructions)) payload.instructions = DEFAULT_DATA.instructions;
      if (!Array.isArray(payload.services)) payload.services = DEFAULT_DATA.services;

      if (isExpired(payload.guest.checkOutDate)) {
        return renderGuestError("انتهت صلاحية هذا الرابط. يرجى التواصل مع المنشأة.");
      }

      document.documentElement.lang = "ar";
      document.documentElement.dir = "rtl";
      q("app").innerHTML = `
        <div class="topbar">
          <div class="container topbar-inner">
            <div>
              <div class="brand">HostFlow AI</div>
              <div class="subbrand">صفحة الضيف - ${esc(payload.property.name)}</div>
            </div>
          </div>
        </div>

        <header class="hero">
          <div class="container">
            <div class="hero-grid">
              <div>
                <h1>👋 أهلًا بك ${esc(payload.guest.name)}</h1>
                <p>نسعد باستضافتك ونتمنى لك إقامة مريحة ومميزة.</p>
                <div class="chip-row">
                  <div class="chip">🏨 ${esc(payload.property.name)}</div>
                  <div class="chip">🏢 ${esc(payload.unit.floor)} - شقة ${esc(payload.unit.name)}</div>
                  <div class="chip">كل ما تحتاجه موجود هنا</div>
                </div>
              </div>
              <div class="hero-card">
                <ul class="hero-list">
                  <li>📶 بيانات الواي فاي الخاصة بالشقة</li>
                  <li>🔑 تعليمات الدخول والإقامة</li>
                  <li>🛎️ طلب الخدمات بضغطة واحدة</li>
                  <li>🚨 أرقام التواصل والطوارئ</li>
                  <li>⭐ تقييم التجربة بعد الإقامة</li>
                </ul>
              </div>
            </div>
          </div>
        </header>

        <main>
          <div class="container">
            <div class="grid-2">
              <section class="card">
                <h2 class="section-title">المعلومات الأساسية</h2>
                <div class="info-grid">
                  <div class="info-box"><strong>الدور</strong>${esc(payload.unit.floor)}</div>
                  <div class="info-box"><strong>رقم الشقة</strong>${esc(payload.unit.name)}</div>
                  <div class="info-box"><strong>اسم الشبكة</strong>${esc(payload.unit.wifi)}</div>
                  <div class="info-box"><strong>كلمة المرور</strong>${esc(payload.unit.password)}</div>
                  <div class="info-box"><strong>الخروج</strong>${esc(payload.unit.checkOut)}</div>
                </div>
                <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;">
                  <a class="btn btn-primary" href="${esc(payload.property.locationUrl || "#")}" target="_blank">📍 فتح الموقع</a>
                  <a class="btn btn-soft" href="tel:${cleanPhone(payload.property.frontDeskPhone || payload.property.phone)}">☎️ الاستقبال</a>
                </div>
              </section>

              <section class="card">
                <h2 class="section-title">تعليمات الدخول</h2>
                <ol class="steps">${payload.instructions.map(x => `<li>${esc(x)}</li>`).join("")}</ol>
              </section>
            </div>

            <section class="card">
              <h2 class="section-title">طلب خدمة</h2>
              <div class="section-subtitle">اختر الخدمة المطلوبة وسيتم فتح رسالة واتساب جاهزة للمنشأة.</div>
              <div class="action-grid">
                ${payload.services.map(s => `<a class="btn btn-soft" target="_blank" href="${whatsappLink(payload.property.phone, serviceMessage(payload, s.type))}">${esc(s.label)}</a>`).join("")}
              </div>
            </section>

            <div class="grid-2">
              <section class="card">
                <h2 class="section-title">القوانين</h2>
                <ul class="rules-list">${payload.rules.map(x => `<li>${esc(x)}</li>`).join("")}</ul>
              </section>

              <section class="card">
                <h2 class="section-title">الطوارئ والتقييم</h2>
                <p class="section-subtitle">في الحالات الطارئة يرجى التواصل فورًا.</p>
                <div style="display:flex;gap:12px;flex-wrap:wrap;">
                  <a class="btn btn-danger" href="tel:${cleanPhone(payload.property.emergencyPhone || payload.property.phone)}">🚨 اتصال طارئ</a>
                  ${payload.property.feedbackUrl ? `<a class="btn btn-success" href="${esc(payload.property.feedbackUrl)}" target="_blank">⭐ قيّم تجربتك</a>` : ""}
                </div>
              </section>
            </div>

            <div class="footer-note">${RIGHTS}</div>
          </div>
        </main>
      `;
    }

    function renderGuestError(message) {
      q("app").innerHTML = `
        <main>
          <div class="container">
            <section class="card" style="margin-top:70px;text-align:center;">
              <h2>${esc(message)}</h2>
              <p class="section-subtitle">HostFlow AI</p>
            </section>
          </div>
        </main>
      `;
    }

    document.addEventListener("contextmenu", e => e.preventDefault());
    render();
  </script>
</body>
</html>
