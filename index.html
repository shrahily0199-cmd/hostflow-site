    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return clone(DEFAULT_DATA);
        return normalizeDb(JSON.parse(raw));
      } catch (error) {
        console.error("loadData failed", error);
        return clone(DEFAULT_DATA);
      }
    }

    function normalizeDb(data) {
      const clean = clone(DEFAULT_DATA);
      data = data && typeof data === "object" ? data : {};

      clean.property = { ...clean.property, ...(data.property || {}) };

      clean.rules = Array.isArray(data.rules) ? data.rules.filter(Boolean) : clean.rules;
      clean.instructions = Array.isArray(data.instructions) ? data.instructions.filter(Boolean) : clean.instructions;

      clean.services = Array.isArray(data.services) ? data.services.map(service => ({
        label: service.label || "خدمة",
        type: service.type || service.label || "خدمة",
        enabled: service.enabled !== false
      })) : clean.services;

      clean.units = Array.isArray(data.units) ? data.units.map(unit => ({
        id: unit.id || makeId("unit"),
        floor: unit.floor || "-",
        name: unit.name || "-",
        wifi: unit.wifi || "-",
        password: unit.password || "-",
        checkIn: unit.checkIn || "3:00 مساءً",
        checkOut: unit.checkOut || "12:00 ظهرًا"
      })) : [];

      clean.guests = Array.isArray(data.guests) ? data.guests.map(guest => ({
        id: guest.id || makeId("guest"),
        name: guest.name || "-",
        phone: guest.phone || "",
        unitSnapshot: normalizeUnitSnapshot(guest.unitSnapshot || {}),
        checkInDate: guest.checkInDate || "",
        checkOutDate: guest.checkOutDate || "",
        createdAt: guest.createdAt || Date.now()
      })) : [];

      return clean;
    }

    function normalizeUnitSnapshot(unit) {
      return {
        floor: unit.floor || "-",
        name: unit.name || "-",
        wifi: unit.wifi || "-",
        password: unit.password || "-",
        checkIn: unit.checkIn || "3:00 مساءً",
        checkOut: unit.checkOut || "12:00 ظهرًا"

    }

    function saveData() {

    function q(id) {

    function makeId(prefix) {
      return prefix + "-" + Date.now() + "-" + Math.random().toString(16).slice(2);
    }

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[ch]));
    }

    function showStatus(message) {
      const box = q("statusBox");
      if (!box) return;
      box.textContent = message;
      box.classList.add("show");
      clearTimeout(showStatus._t);
      showStatus._t = setTimeout(() => box.classList.remove("show"), 2600);
    }

    function cleanPhone(phone) {
      return String(phone || "").replace(/[^\d]/g, "");
    }

    function encodePayload(obj) {
      const json = JSON.stringify(obj);
      const utf8 = encodeURIComponent(json).replace(/%([0-9A-F]{2})/g, (_, p1) =>
        String.fromCharCode(parseInt(p1, 16))
      );
      return btoa(utf8).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    function decodePayload(str) {
      try {
        let base64 = String(str || "").replace(/-/g, "+").replace(/_/g, "/");
        while (base64.length % 4) base64 += "=";
        const binary = atob(base64);
        const json = decodeURIComponent(Array.from(binary).map(char =>
          "%" + char.charCodeAt(0).toString(16).padStart(2, "0")
        ).join(""));
        return JSON.parse(json);
      } catch (error) {
        console.error("decodePayload failed", error);
        return null;
      }
    }

    function todayText() {
      return new Date().toISOString().slice(0, 10);
    }

    function isExpired(checkOutDate) {
      return Boolean(checkOutDate && todayText() > checkOutDate);
    }

    function buildGuestPayload(guest) {
      return {
        property: db.property,
        guest: {
          id: guest.id,
          name: guest.name,
          phone: guest.phone,
          checkInDate: guest.checkInDate,
          checkOutDate: guest.checkOutDate

        unit: normalizeUnitSnapshot(guest.unitSnapshot),
        rules: db.rules,
        instructions: db.instructions,
        services: db.services.filter(service => service.enabled !== false),
        rights: RIGHTS
      };
    }

    function guestUrl(payload) {
      return `${window.location.origin}${window.location.pathname}?data=${encodePayload(payload)}`;
    }

    function whatsappLink(phone, message) {
      return `https://wa.me/${cleanPhone(phone)}?text=${encodeURIComponent(message)}`;
    }

    function qrUrl(link, size = 180) {
      return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(link)}`;
    }

    function fixedWelcomeMessage(guest, link) {

    }

      return `السلام عليكم،\nأنا ${payload.guest.name}\nالدور: ${payload.unit.floor}\nالشقة: ${payload.unit.name}\nالمنشأة: ${payload.property.name}\n\nأرغب بطلب: ${serviceType}\n\nشكرًا لكم.`;
    }

    function splitLines(text) {
      return String(text || "").split("\n").map(item => item.trim()).filter(Boolean);
    }

    function ruleSuggestions() {

        "يمنع الإزعاج بعد الساعة 10 مساءً.",

        "يرجى المحافظة على نظافة المكان.",

        "استخدم بيانات الدخول المرسلة لك من المنشأة.",
        "تأكد من إغلاق الباب جيدًا عند الدخول والخروج.",

        "عند المغادرة، تأكد من عدم نسيان أي أغراض شخصية."
      ];
    }

    function addSuggestionTo(textareaId, index, type) {
      const list = type === "rule" ? ruleSuggestions() : instructionSuggestions();
      const value = list[index];
      const area = q(textareaId);
      if (!area || !value) return;
      const current = splitLines(area.value);
      if (!current.includes(value)) current.push(value);
      area.value = current.join("\n");
    }

      return new URLSearchParams(window.location.search).get("data");
