<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HostFlow AI</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--text:#162033;--muted:#667085;--line:#e6ecf3;--primary:#1f6feb;--primary-soft:#eef4ff;--dark:#0f172a;--danger:#dc2626;--success:#0f766e;--shadow:0 12px 30px rgba(15,23,42,.08);--radius:18px}*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}.container{width:min(1240px,calc(100% - 28px));margin:auto}.topbar{position:sticky;top:0;z-index:10;background:rgba(15,23,42,.96);color:#fff}.topbar-inner{min-height:72px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{font-weight:800;font-size:1.1rem}.subbrand{font-size:.85rem;color:rgba(255,255,255,.75)}.pill{border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:#fff;border-radius:999px;padding:10px 14px;cursor:pointer;font-weight:700}.hero{background:linear-gradient(135deg,#0f172a,#1e293b 45%,#334155);color:#fff;padding:30px 0 42px}.hero-grid{display:grid;grid-template-columns:1.2fr .9fr;gap:20px}.hero h1{font-size:clamp(2rem,4vw,3.2rem);margin:0 0 12px}.hero p{color:rgba(255,255,255,.9)}.hero-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:22px;padding:20px}.hero-list{list-style:none;margin:0;padding:0;display:grid;gap:10px}main{padding:24px 0 60px}.notice{background:#fff8e6;color:#7a5b00;border:1px solid #f4df9b;border-radius:14px;padding:14px 16px;margin-bottom:18px}.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:18px}.section-title{font-weight:800;font-size:1.18rem;margin:0 0 12px}.section-subtitle{color:var(--muted);font-size:.95rem}.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}.field label{font-weight:700}.field input,.field textarea,.field select{border:1px solid var(--line);border-radius:12px;padding:12px 14px;font:inherit}.field textarea{min-height:110px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:46px;padding:12px 16px;border-radius:14px;border:1px solid transparent;text-decoration:none;cursor:pointer;font-weight:800;font:inherit}.btn-primary{background:var(--primary);color:#fff}.btn-soft{background:var(--primary-soft);color:#1558b8;border-color:#d8e6ff}.btn-dark{background:var(--dark);color:#fff}.btn-danger{background:#fff1f2;color:var(--danger);border-color:#ffd8df}.btn-success{background:#ecfeff;color:var(--success);border-color:#d0f5f0}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.kpi{background:#fafcff;border:1px solid var(--line);border-radius:16px;padding:16px}.kpi .label{color:var(--muted);font-size:.88rem}.kpi .value{font-size:1.5rem;font-weight:800}.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px}table{width:100%;border-collapse:collapse;background:#fff;min-width:860px}th,td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:right;vertical-align:top}th{background:#fafcff}.table-actions{display:flex;gap:8px;flex-wrap:wrap}.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.info-box{background:#fafcff;border:1px solid var(--line);border-radius:14px;padding:14px}.info-box strong{display:block}.action-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.rules-list,.steps{color:var(--muted)}.chip-row{display:flex;gap:10px;flex-wrap:wrap}.chip{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15)}.status-box{position:fixed;bottom:20px;right:20px;background:#0f172a;color:#fff;padding:14px 16px;border-radius:14px;display:none;max-width:380px}.status-box.show{display:block}.footer-note{text-align:center;color:var(--muted);margin-top:20px}@media(max-width:900px){.hero-grid,.grid-2,.grid-3,.kpis,.info-grid,.action-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div><div id="statusBox" class="status-box"></div>
<script>
const RIGHTS='HostFlow AI © 2026 Abdulrahman Shrahily . All Rights Reserved.';
const KEY='hostflow_clean_final';
const DEFAULT={property:{name:'منشأة المستقبل',type:'شقق مفروشة',phone:'966500000000',frontDeskPhone:'966500000000',emergencyPhone:'966500000000',locationUrl:'https://maps.google.com',feedbackUrl:''},rules:['يمنع الإزعاج بعد الساعة 10 مساءً.','يمنع التدخين داخل الوحدة.','يرجى المحافظة على نظافة المكان.','الالتزام بوقت تسجيل الخروج.'],instructions:['تأكد من رقم الوحدة قبل الدخول.','استخدم بيانات الدخول المرسلة لك من المنشأة.','تأكد من إغلاق الباب جيدًا عند الخروج.'],services:[{label:'🧹 طلب تنظيف',type:'تنظيف',enabled:true},{label:'🛁 طلب مناشف',type:'مناشف',enabled:true},{label:'❄️ مشكلة في التكييف',type:'مشكلة في التكييف',enabled:true},{label:'🔧 طلب صيانة',type:'صيانة',enabled:true},{label:'❓ طلب مساعدة',type:'مساعدة',enabled:true}],units:[],guests:[],auditLog:[]};
let db=load();
function load(){try{return Object.assign(structuredClone(DEFAULT),JSON.parse(localStorage.getItem(KEY)||'{}'))}catch(e){return structuredClone(DEFAULT)}}
function save(){localStorage.setItem(KEY,JSON.stringify(db))}
function q(id){return document.getElementById(id)}
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function status(m){let b=q('statusBox');b.textContent=m;b.classList.add('show');clearTimeout(status.t);status.t=setTimeout(()=>b.classList.remove('show'),2500)}
function audit(action,details={}){db.auditLog=db.auditLog||[];db.auditLog.unshift({action,details,time:new Date().toLocaleString('ar-SA'),ts:new Date().toISOString()});db.auditLog=db.auditLog.slice(0,300);save()}
function showLog(){let logs=db.auditLog||[];if(!logs.length)return alert('لا يوجد سجل حتى الآن.');alert(logs.map((l,i)=>`${i+1}) ${l.time}\n${l.action}\n${Object.entries(l.details||{}).map(([k,v])=>k+': '+v).join('\n')}`).join('\n\n-----------\n\n'))}
function lines(t){return String(t||'').split('\n').map(x=>x.trim()).filter(Boolean)}
function phone(p){return String(p||'').replace(/[^\d]/g,'')}
function enc(o){let s=encodeURIComponent(JSON.stringify(o)).replace(/%([0-9A-F]{2})/g,(_,p)=>String.fromCharCode(parseInt(p,16)));return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}
function dec(s){try{let b=String(s||'').replace(/-/g,'+').replace(/_/g,'/');while(b.length%4)b+='=';let bin=atob(b);let json=decodeURIComponent(Array.from(bin).map(c=>'%'+c.charCodeAt(0).toString(16).padStart(2,'0')).join(''));return JSON.parse(json)}catch(e){return null}}
function today(){return new Date().toISOString().slice(0,10)}
function expired(d){return d&&today()>d}
function linkFor(payload){return location.origin+location.pathname+'?data='+enc(payload)}
function wa(p,m){return 'https://wa.me/'+phone(p)+'?text='+encodeURIComponent(m)}
function welcome(g,p,l){return `أهلًا ${g.name}، نرحب بك في ${p.name} ونتمنى لك إقامة مريحة ومميزة.\nكل ما تحتاجه خلال إقامتك موجود في هذا الرابط:\n${l}`}
function serviceMsg(p,t){return `السلام عليكم،\nأنا ${p.guest.name}\nالوحدة: ${p.unit.name}\nالمنشأة: ${p.property.name}\n\nأرغب بطلب: ${t}\n\nشكرًا لكم.`}
function payload(g,u){return{property:db.property,guest:g,unit:u,rules:db.rules,instructions:db.instructions,services:db.services.filter(s=>s.enabled!==false),rights:RIGHTS}}
function render(){let d=new URLSearchParams(location.search).get('data');d?renderGuest(dec(d)):renderAdmin()}
function renderAdmin(){q('app').innerHTML=`<div class="topbar"><div class="container topbar-inner"><div><div class="brand">HostFlow AI</div><div class="subbrand">لوحة المنشأة - إدارة الوحدات والمستأجرين</div></div><div class="top-actions"><button class="pill" onclick="demo()">تحميل مثال</button><button class="pill" onclick="exportData()">تصدير البيانات</button><button class="pill" onclick="showLog()">السجل القانوني</button></div></div></div><header class="hero"><div class="container"><div class="hero-grid"><div><h1>إدارة احترافية للمنشأة</h1><p>لوحة واحدة لإدارة بيانات المنشأة، الوحدات، الواي فاي، والمستأجرين، مع رابط ضيف خاص ينتهي بعد تاريخ الخروج.</p><p>هذه الواجهة خاصة بالمنشأة فقط. المستأجر يرى صفحة خاصة به عبر الرابط.</p></div><div class="hero-card"><ul class="hero-list"><li>🏨 بيانات منشأة قابلة للتغيير حسب العميل</li><li>🚪 إدارة الوحدات والواي فاي</li><li>👤 إنشاء رابط خاص لكل مستأجر</li><li>💬 رسالة ترحيب واتساب ثابتة ومميزة</li><li>🛎️ خدمات ضيف قابلة للتفعيل والتعطيل</li><li>⏳ انتهاء رابط الضيف بعد تاريخ الخروج</li><li>🔒 ${esc(RIGHTS)}</li></ul></div></div></div></header><main><div class="container"><div class="notice">الـ Admin يبقى شغال دائمًا للمنشأة. انتهاء الصلاحية يطبق فقط على رابط المستأجر.</div><section class="card"><h2 class="section-title">ملخص سريع</h2><div class="kpis"><div class="kpi"><div class="label">الوحدات</div><div class="value">${db.units.length}</div></div><div class="kpi"><div class="label">المستأجرون</div><div class="value">${db.guests.length}</div></div><div class="kpi"><div class="label">الخدمات</div><div class="value">${db.services.filter(s=>s.enabled!==false).length}</div></div><div class="kpi"><div class="label">الحالة</div><div class="value">جاهز</div></div></div></section><div class="grid-2"><section class="card"><h2 class="section-title">بيانات المنشأة</h2>${field('اسم المنشأة','propertyName',db.property.name)}<div class="field"><label>نوع المنشأة</label><select id="propertyType">${['شقق مفروشة','فندق','فيلا','استراحة','شاليه','منتجع'].map(t=>`<option ${db.property.type===t?'selected':''}>${t}</option>`).join('')}</select></div>${field('رقم واتساب المنشأة','propertyPhone',db.property.phone)}${field('رقم الاستقبال','frontDeskPhone',db.property.frontDeskPhone)}${field('رقم الطوارئ','emergencyPhone',db.property.emergencyPhone)}${field('رابط الموقع','locationUrl',db.property.locationUrl)}${field('رابط التقييم','feedbackUrl',db.property.feedbackUrl)}<button class="btn btn-dark" onclick="saveProperty()">حفظ بيانات المنشأة</button></section><section class="card"><h2 class="section-title">الرسائل والقوانين الثابتة</h2><div class="field"><label>القوانين الثابتة</label><textarea id="rulesInput">${esc(db.rules.join('\n'))}</textarea></div><div class="field"><label>تعليمات الدخول</label><textarea id="instructionsInput">${esc(db.instructions.join('\n'))}</textarea></div><button class="btn btn-soft" onclick="saveContent()">حفظ القوانين والتعليمات</button></section></div><section class="card"><h2 class="section-title">الخدمات التي تظهر للضيف</h2><div class="table-wrap"><table><thead><tr><th>الخدمة</th><th>نوع الطلب</th><th>الحالة</th><th>الإجراءات</th></tr></thead><tbody>${servicesRows()}</tbody></table></div><div class="grid-3" style="margin-top:16px"><div class="field"><label>اسم الزر</label><input id="serviceLabel" placeholder="مثال: 🧺 طلب غسيل"></div><div class="field"><label>نوع الطلب في الرسالة</label><input id="serviceType" placeholder="مثال: غسيل ملابس"></div></div><button class="btn btn-primary" onclick="addService()">إضافة خدمة</button></section><section class="card"><h2 class="section-title">إضافة وحدة</h2><div class="grid-3"><div class="field"><label>رقم/اسم الوحدة</label><input id="unitName" placeholder="مثال: 101"></div><div class="field"><label>اسم شبكة الواي فاي</label><input id="unitWifi" placeholder="HotelWiFi-101"></div><div class="field"><label>كلمة المرور</label><input id="unitPass"></div><div class="field"><label>وقت الدخول</label><input id="unitCheckIn" placeholder="3:00 مساءً"></div><div class="field"><label>وقت الخروج</label><input id="unitCheckOut" placeholder="12:00 ظهرًا"></div></div><button class="btn btn-primary" onclick="addUnit()">حفظ الوحدة</button></section><section class="card"><h2 class="section-title">الوحدات</h2><div class="table-wrap"><table><thead><tr><th>الوحدة</th><th>الواي فاي</th><th>الدخول / الخروج</th><th>الإجراءات</th></tr></thead><tbody>${unitRows()}</tbody></table></div></section><section class="card"><h2 class="section-title">إضافة مستأجر</h2><div class="grid-3"><div class="field"><label>اسم العميل</label><input id="guestName"></div><div class="field"><label>رقم جوال العميل</label><input id="guestPhone"></div><div class="field"><label>الوحدة</label><select id="guestUnit">${db.units.map((u,i)=>`<option value="${i}">${esc(u.name)}</option>`).join('')}</select></div><div class="field"><label>تاريخ الدخول</label><input id="guestCheckInDate" type="date"></div><div class="field"><label>تاريخ الخروج</label><input id="guestCheckOutDate" type="date"></div></div><button class="btn btn-primary" onclick="addGuest()">حفظ المستأجر وإنشاء رابطه</button></section><section class="card"><h2 class="section-title">المستأجرون والروابط</h2><div class="table-wrap"><table><thead><tr><th>العميل</th><th>الوحدة</th><th>مدة الإقامة</th><th>الرابط</th><th>الإجراءات</th></tr></thead><tbody>${guestRows()}</tbody></table></div></section><div class="footer-note">${esc(RIGHTS)}</div></div></main>`}
function field(label,id,val){return `<div class="field"><label>${label}</label><input id="${id}" value="${esc(val||'')}"></div>`}
function servicesRows(){return db.services.length?db.services.map((s,i)=>`<tr><td><strong>${esc(s.label)}</strong></td><td>${esc(s.type)}</td><td>${s.enabled===false?'معطلة':'مفعلة'}</td><td><div class="table-actions"><button class="btn btn-soft" onclick="toggleService(${i})">${s.enabled===false?'تفعيل':'تعطيل'}</button><button class="btn btn-danger" onclick="deleteService(${i})">حذف</button></div></td></tr>`).join(''):'<tr><td colspan="4">لا توجد خدمات</td></tr>'}
function unitRows(){return db.units.length?db.units.map((u,i)=>`<tr><td><strong>${esc(u.name)}</strong></td><td>${esc(u.wifi)}<br><span style="color:var(--muted)">${esc(u.password)}</span></td><td>${esc(u.checkIn||'-')}<br><span style="color:var(--muted)">${esc(u.checkOut||'-')}</span></td><td><button class="btn btn-danger" onclick="deleteUnit(${i})">حذف</button></td></tr>`).join(''):'<tr><td colspan="4">لا توجد وحدات حتى الآن</td></tr>'}
function guestRows(){return db.guests.length?db.guests.map((g,i)=>{let u=db.units[g.unitIndex];let l=linkFor(payload(g,u));return `<tr><td><strong>${esc(g.name)}</strong><br><span style="color:var(--muted)">${esc(g.phone)}</span></td><td>${esc(u?u.name:'-')}</td><td>${esc(g.checkInDate||'-')}<br><span style="color:var(--muted)">${esc(g.checkOutDate||'-')}</span></td><td><a href="${esc(l)}" target="_blank">فتح الرابط</a></td><td><div class="table-actions"><button class="btn btn-primary" onclick="copyGuest(${i})">نسخ الرابط</button><button class="btn btn-success" onclick="sendWelcome(${i})">ترحيب واتساب</button><button class="btn btn-danger" onclick="deleteGuest(${i})">حذف</button></div></td></tr>`}).join(''):'<tr><td colspan="5">لا يوجد مستأجرون حتى الآن</td></tr>'}
function saveProperty(){db.property={name:q('propertyName').value.trim()||'منشأة جديدة',type:q('propertyType').value,phone:q('propertyPhone').value.trim(),frontDeskPhone:q('frontDeskPhone').value.trim(),emergencyPhone:q('emergencyPhone').value.trim(),locationUrl:q('locationUrl').value.trim(),feedbackUrl:q('feedbackUrl').value.trim()};audit('حفظ بيانات المنشأة',{المنشأة:db.property.name});save();status('تم حفظ بيانات المنشأة');renderAdmin()}
function saveContent(){db.rules=lines(q('rulesInput').value);db.instructions=lines(q('instructionsInput').value);if(!db.rules.length)db.rules=structuredClone(DEFAULT.rules);if(!db.instructions.length)db.instructions=structuredClone(DEFAULT.instructions);audit('حفظ القوانين والتعليمات',{القوانين:db.rules.length});save();status('تم الحفظ');renderAdmin()}
function addService(){let label=q('serviceLabel').value.trim(),type=q('serviceType').value.trim();if(!label||!type)return alert('أدخل اسم الزر ونوع الطلب');db.services.push({label,type,enabled:true});audit('إضافة خدمة',{الخدمة:label});save();renderAdmin()}
function toggleService(i){db.services[i].enabled=db.services[i].enabled===false;audit('تغيير حالة خدمة',{الخدمة:db.services[i].label});save();renderAdmin()}
function deleteService(i){if(!confirm('حذف الخدمة؟'))return;let r=db.services[i];db.services.splice(i,1);audit('حذف خدمة',{الخدمة:r.label});save();renderAdmin()}
function addUnit(){let name=q('unitName').value.trim(),wifi=q('unitWifi').value.trim(),password=q('unitPass').value.trim();if(!name||!wifi||!password)return alert('أدخل رقم الوحدة والواي فاي وكلمة المرور');db.units.push({name,wifi,password,checkIn:q('unitCheckIn').value.trim()||'3:00 مساءً',checkOut:q('unitCheckOut').value.trim()||'12:00 ظهرًا'});audit('إضافة وحدة',{الوحدة:name});save();status('تم حفظ الوحدة');renderAdmin()}
function deleteUnit(i){if(!confirm('حذف الوحدة؟'))return;let r=db.units[i];db.units.splice(i,1);db.guests=db.guests.filter(g=>g.unitIndex!==i);audit('حذف وحدة',{الوحدة:r.name});save();renderAdmin()}
function addGuest(){if(!db.units.length)return alert('أضف وحدة أولًا');let name=q('guestName').value.trim(),phoneN=q('guestPhone').value.trim(),unitIndex=Number(q('guestUnit').value),checkInDate=q('guestCheckInDate').value,checkOutDate=q('guestCheckOutDate').value;if(!name||!phoneN||!checkOutDate)return alert('أدخل اسم العميل ورقمه وتاريخ الخروج');db.guests.push({name,phone:phoneN,unitIndex,checkInDate,checkOutDate,createdAt:Date.now()});audit('إضافة مستأجر',{العميل:name,الوحدة:db.units[unitIndex].name});save();status('تم حفظ المستأجر');renderAdmin()}
function deleteGuest(i){if(!confirm('حذف المستأجر؟'))return;let r=db.guests[i];db.guests.splice(i,1);audit('حذف مستأجر',{العميل:r.name});save();renderAdmin()}
async function copyGuest(i){let g=db.guests[i],u=db.units[g.unitIndex],l=linkFor(payload(g,u));try{await navigator.clipboard.writeText(l);audit('نسخ رابط الضيف',{العميل:g.name});status('تم نسخ الرابط')}catch(e){prompt('انسخ الرابط:',l)}}
function sendWelcome(i){let g=db.guests[i],u=db.units[g.unitIndex],l=linkFor(payload(g,u));audit('إرسال ترحيب واتساب',{العميل:g.name});window.open(wa(g.phone,welcome(g,db.property,l)),'_blank')}
function demo(){db=structuredClone(DEFAULT);db.units=[{name:'101',wifi:'Future-101',password:'12345678',checkIn:'3:00 مساءً',checkOut:'12:00 ظهرًا'},{name:'102',wifi:'Future-102',password:'87654321',checkIn:'3:00 مساءً',checkOut:'12:00 ظهرًا'}];audit('تحميل مثال',{});save();renderAdmin()}
function exportData(){let blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='hostflow-data.json';a.click();URL.revokeObjectURL(url)}
function renderGuest(p){if(!p||!p.guest||!p.unit||!p.property)return guestError('رابط غير صالح. يرجى التواصل مع المنشأة.');if(expired(p.guest.checkOutDate))return guestError('انتهت صلاحية هذا الرابط. يرجى التواصل مع المنشأة.');q('app').innerHTML=`<div class="topbar"><div class="container topbar-inner"><div><div class="brand">HostFlow AI</div><div class="subbrand">صفحة الضيف - ${esc(p.property.name)}</div></div></div></div><header class="hero"><div class="container"><div class="hero-grid"><div><h1>👋 أهلًا بك ${esc(p.guest.name)}</h1><p>نسعد باستضافتك ونتمنى لك إقامة مريحة ومميزة.</p><div class="chip-row"><div class="chip">🏨 ${esc(p.property.name)}</div><div class="chip">🚪 الوحدة ${esc(p.unit.name)}</div><div class="chip">كل ما تحتاجه موجود هنا</div></div></div><div class="hero-card"><ul class="hero-list"><li>📶 بيانات الواي فاي</li><li>🔑 تعليمات الدخول</li><li>🛎️ طلب الخدمات</li><li>🚨 الطوارئ والتواصل</li><li>⭐ التقييم</li></ul></div></div></div></header><main><div class="container"><div class="grid-2"><section class="card"><h2 class="section-title">المعلومات الأساسية</h2><div class="info-grid"><div class="info-box"><strong>الوحدة</strong>${esc(p.unit.name)}</div><div class="info-box"><strong>اسم الشبكة</strong>${esc(p.unit.wifi)}</div><div class="info-box"><strong>كلمة المرور</strong>${esc(p.unit.password)}</div><div class="info-box"><strong>الخروج</strong>${esc(p.unit.checkOut)}</div></div><div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px"><a class="btn btn-primary" href="${esc(p.property.locationUrl||'#')}" target="_blank">📍 فتح الموقع</a><a class="btn btn-soft" href="tel:${esc(p.property.frontDeskPhone||p.property.phone)}">☎️ الاستقبال</a></div></section><section class="card"><h2 class="section-title">تعليمات الدخول</h2><ol class="steps">${p.instructions.map(x=>`<li>${esc(x)}</li>`).join('')}</ol></section></div><section class="card"><h2 class="section-title">طلب خدمة</h2><div class="section-subtitle">اختر الخدمة المطلوبة وسيتم فتح رسالة واتساب جاهزة للمنشأة.</div><div class="action-grid">${p.services.map(s=>`<a class="btn btn-soft" target="_blank" href="${esc(wa(p.property.phone,serviceMsg(p,s.type)))}">${esc(s.label)}</a>`).join('')}</div></section><div class="grid-2"><section class="card"><h2 class="section-title">القوانين</h2><ul class="rules-list">${p.rules.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></section><section class="card"><h2 class="section-title">الطوارئ والتقييم</h2><p class="section-subtitle">في الحالات الطارئة يرجى التواصل فورًا.</p><div style="display:flex;gap:12px;flex-wrap:wrap"><a class="btn btn-danger" href="tel:${esc(p.property.emergencyPhone||p.property.phone)}">🚨 اتصال طارئ</a>${p.property.feedbackUrl?`<a class="btn btn-success" href="${esc(p.property.feedbackUrl)}" target="_blank">⭐ قيّم تجربتك</a>`:''}</div></section></div><div class="footer-note">${esc(RIGHTS)}</div></div></main>`}
function guestError(m){q('app').innerHTML=`<main><div class="container"><section class="card" style="margin-top:70px;text-align:center"><h2>${esc(m)}</h2><p class="section-subtitle">HostFlow AI</p></section></div></main>`}
document.addEventListener('contextmenu',e=>e.preventDefault());render();
</script>
</body>
</html>
