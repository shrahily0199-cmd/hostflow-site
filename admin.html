<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HostFlow AI - Admin</title>

<!-- الحقوق -->
<!-- HostFlow AI © Abdullah Shrahily -->

<style>
body {font-family: Arial; background:#f4f7fb;}
.card {background:#fff;padding:20px;border-radius:12px;margin:20px;}
button {padding:10px 15px;cursor:pointer;}
</style>
</head>

<body>

<div class="card">
<h2>إضافة مستأجر</h2>

<input id="name" placeholder="اسم العميل"><br><br>
<input id="phone" placeholder="رقم العميل"><br><br>
<input id="unit" placeholder="رقم الوحدة"><br><br>
<input id="wifi" placeholder="اسم الواي فاي"><br><br>
<input id="pass" placeholder="كلمة المرور"><br><br>
<input id="checkout" type="date"><br><br>

<button onclick="generate()">إنشاء الرابط</button>

<p id="result"></p>
</div>

<script>
function generate(){

let data = {
name: name.value,
phone: phone.value,
unit: unit.value,
wifi: wifi.value,
pass: pass.value,
exp: checkout.value
}

let encoded = btoa(JSON.stringify(data))

let link = location.origin + "/guest.html?data=" + encoded

result.innerHTML = link
navigator.clipboard.writeText(link)
}
</script>

</body>
</html>
